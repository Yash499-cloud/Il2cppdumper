name: Extract Build Files

on:
  workflow_dispatch:

jobs:
  extract:
    runs-on: ubuntu-latest
    steps:
      - name: Cleanup & Sync
        run: |
          # Sirf zaroori folder sync karenge (Storage bachane ke liye)
          mkdir ~/fox && cd ~/fox
          repo init --depth=1 -u https://github.com/OrangeFoxRecovery/manifest.git -b fox_12.1
          # Hum sirf prebuilts aur tools sync karenge jo build mein kaam aate hain
          repo sync -c -j$(nproc --all) --no-clone-bundle --no-tags

      - name: Zip Essential Files
        run: |
          cd ~/fox
          # Build tools aur prebuilts ko zip karo (Yahi sabse badi hoti hain)
          zip -r9 build_essentials.zip build/envsetup.sh prebuilts/build-tools vendor/omni/build/tools
          
      - name: Upload to Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Essential-Files
          path: ~/fox/build_essentials.zip
          
