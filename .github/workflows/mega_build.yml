name: OrangeFox - Build (Automated for Tecno KI8)

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        required: true
        default: 'recovery'
        type: choice
        options:
          - recovery
          - boot
      clean_build:
        description: 'Clean build (rm -rf out)'
        required: false
        default: false
        type: boolean
  push:
    branches: [ main ]

jobs:
  build:
    name: Build OFRP for Tecno KI8
    runs-on: ubuntu-24.04
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      MANIFEST_BRANCH: '12.1'
      DEVICE_TREE: 'https://github.com/Yash499-cloud/Il2cppdumper'
      DEVICE_TREE_BRANCH: 'main'
      DEVICE_PATH: 'device/tecno/KI8'
      DEVICE_NAME: 'KI8'
      PRODUCT_NAME: 'omni_TECNO_KI8'
      DEBIAN_FRONTEND: noninteractive
    permissions:
      contents: write

    steps:
      - name: Maximize Build Space
        run: |
          sudo swapoff -a
          sudo rm -f /swapfile
          sudo docker image prune -a -f
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/share/boost /usr/lib/jvm
          sudo apt clean
          df -h

      - name: Checkout
        uses: actions/checkout@v4

      - name: Clean-up
        uses: rokibhasansagar/slimhub_actions@main

      - name: Swap Space
        uses: pierotofy/set-swap-space@master
        with:
          swap-size-gb: 24

      - name: Install Build Environment
        run: |
          set -e
          echo "⚙️ Updating package lists..."
          sudo apt update
          
          echo "⚙️ Installing build dependencies for Ubuntu 24.04..."
          sudo apt install -y \
            git-core \
            gnupg \
            flex \
            bison \
            build-essential \
            zip \
            curl \
            zlib1g-dev \
            gcc-multilib \
            g++-multilib \
            libc6-dev-i386 \
            libncurses-dev \
            lib32ncurses-dev \
            x11proto-core-dev \
            libx11-dev \
            lib32z1-dev \
            libgl1-mesa-dev \
            libxml2-utils \
            xsltproc \
            unzip \
            fontconfig \
            python3 \
            python3-pip \
            openjdk-11-jdk \
            patchelf \
            bc \
            cpio \
            dosfstools \
            e2fsprogs \
            f2fs-tools \
            gperf \
            libelf-dev \
            liblz4-tool \
            libsdl1.2-dev \
            libssl-dev \
            lzop \
            mkbootimg \
            pngcrush \
            schedtool \
            squashfs-tools \
            xsltproc \
            zlib1g-dev \
            libwxgtk3.2-dev

          echo "✅ Build dependencies installed successfully."

      - name: Install repo tool
        run: |
          if ! command -v repo &> /dev/null; then
            echo "📦 Installing repo tool manually..."
            mkdir -p ~/bin
            curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
            chmod a+x ~/bin/repo
            echo "$HOME/bin" >> $GITHUB_PATH
          else
            echo "✅ repo already installed."
          fi

      - name: Clone OrangeFox Sync Script
        run: |
          mkdir -p ${GITHUB_WORKSPACE}/OrangeFox
          cd ${GITHUB_WORKSPACE}/OrangeFox
          git config --global user.name "Samuel Kendall"
          git config --global user.email "kinguser981@gmail.com"
          git clone https://gitlab.com/OrangeFox/sync.git
          cd sync
          ./orangefox_sync.sh --branch ${{ env.MANIFEST_BRANCH }} --path ${GITHUB_WORKSPACE}/OrangeFox/fox_${{ env.MANIFEST_BRANCH }}

      - name: Clean Build (if selected)
        if: github.event.inputs.clean_build == 'true'
        run: |
          rm -rf ${GITHUB_WORKSPACE}/OrangeFox/fox_${{ env.MANIFEST_BRANCH }}/out
          echo "✅ Clean build enabled - out directory removed"

      - name: Clone Device Tree and Auto-Fix
        run: |
          cd ${GITHUB_WORKSPACE}/OrangeFox/fox_${{ env.MANIFEST_BRANCH }}
          rm -rf ./${{ env.DEVICE_PATH }}
          git clone ${{ env.DEVICE_TREE }} -b ${{ env.DEVICE_TREE_BRANCH }} ./${{ env.DEVICE_PATH }}
          cd ./${{ env.DEVICE_PATH }}
          echo "🔧 Auto-repairing device tree..."
          rm -f vendorsetup.sh
          if [ ! -f AndroidProducts.mk ]; then
            echo "PRODUCT_MAKEFILES := \$(LOCAL_DIR)/${{ env.PRODUCT_NAME }}.mk" > AndroidProducts.mk
          fi
          if ! grep -q "COMMON_LUNCH_CHOICES" AndroidProducts.mk; then
            echo "" >> AndroidProducts.mk
            echo "# Lunch choices" >> AndroidProducts.mk
            echo "COMMON_LUNCH_CHOICES := ${{ env.PRODUCT_NAME }}-userdebug ${{ env.PRODUCT_NAME }}-eng" >> AndroidProducts.mk
          fi
          if [ ! -f device.mk ]; then
            echo "# Device makefile for Tecno KI8" > device.mk
            echo "\$(call inherit-product, \$(SRC_TARGET_DIR)/product/core_64_bit.mk)" >> device.mk
            echo "\$(call inherit-product, \$(SRC_TARGET_DIR)/product/full_base_telephony.mk)" >> device.mk
            echo "" >> device.mk
            echo "# Inherit from common" >> device.mk
            echo "\$(call inherit-product, device/tecno/KI8/BoardConfig.mk)" >> device.mk
            echo "" >> device.mk
            echo "# Product names" >> device.mk
            echo "PRODUCT_NAME := ${{ env.PRODUCT_NAME }}" >> device.mk
            echo "PRODUCT_DEVICE := ${{ env.DEVICE_NAME }}" >> device.mk
            echo "PRODUCT_BRAND := Tecno" >> device.mk
            echo "PRODUCT_MODEL := ${{ env.DEVICE_NAME }}" >> device.mk
            echo "PRODUCT_MANUFACTURER := Tecno" >> device.mk
          fi
          if [ ! -f BoardConfig.mk ]; then
            echo "# BoardConfig.mk for Tecno KI8" > BoardConfig.mk
            echo "TARGET_NO_BOOTLOADER := true" >> BoardConfig.mk
            echo "TARGET_NO_RADIOIMAGE := true" >> BoardConfig.mk
            echo "TARGET_ARCH := arm64" >> BoardConfig.mk
            echo "TARGET_ARCH_VARIANT := armv8-a" >> BoardConfig.mk
            echo "TARGET_CPU_ABI := arm64-v8a" >> BoardConfig.mk
            echo "TARGET_CPU_ABI2 :=" >> BoardConfig.mk
            echo "TARGET_CPU_VARIANT := cortex-a53" >> BoardConfig.mk
            echo "TARGET_2ND_ARCH := arm" >> BoardConfig.mk
            echo "TARGET_2ND_ARCH_VARIANT := armv7-a-neon" >> BoardConfig.mk
            echo "TARGET_2ND_CPU_ABI := armeabi-v7a" >> BoardConfig.mk
            echo "TARGET_2ND_CPU_ABI2 := armeabi" >> BoardConfig.mk
            echo "TARGET_2ND_CPU_VARIANT := cortex-a53" >> BoardConfig.mk
            echo "TARGET_USES_64_BIT_BINDER := true" >> BoardConfig.mk
            echo "TARGET_SUPPORTS_64_BIT_APPS := true" >> BoardConfig.mk
            echo "TARGET_SUPPORTS_32_BIT_APPS := true" >> BoardConfig.mk
            echo "" >> BoardConfig.mk
            echo "# Kernel" >> BoardConfig.mk
            echo "BOARD_KERNEL_CMDLINE := bootopt=64S3,32N2,64N2" >> BoardConfig.mk
            echo "BOARD_KERNEL_BASE := 0x40078000" >> BoardConfig.mk
            echo "BOARD_KERNEL_OFFSET := 0x00008000" >> BoardConfig.mk
            echo "BOARD_KERNEL_PAGESIZE := 2048" >> BoardConfig.mk
            echo "BOARD_KERNEL_TAGS_OFFSET := 0x0bc08000" >> BoardConfig.mk
            echo "BOARD_RAMDISK_OFFSET := 0x07c08000" >> BoardConfig.mk
            echo "BOARD_DTB_OFFSET := 0x0bc08000" >> BoardConfig.mk
            echo "BOARD_BOOT_HEADER_VERSION := 2" >> BoardConfig.mk
            echo "BOARD_KERNEL_IMAGE_NAME := Image" >> BoardConfig.mk
            echo "BOARD_KERNEL_SEPARATED_DTBO := true" >> BoardConfig.mk
            echo "" >> BoardConfig.mk
            echo "# Partitions" >> BoardConfig.mk
            echo "BOARD_FLASH_BLOCK_SIZE := 131072" >> BoardConfig.mk
            echo "BOARD_BOOTIMAGE_PARTITION_SIZE := 33554432" >> BoardConfig.mk
            echo "BOARD_RECOVERYIMAGE_PARTITION_SIZE := 33554432" >> BoardConfig.mk
            echo "BOARD_SUPER_PARTITION_SIZE := 9126805504" >> BoardConfig.mk
            echo "BOARD_SUPER_PARTITION_GROUPS := main" >> BoardConfig.mk
            echo "BOARD_MAIN_SIZE := 9126805504" >> BoardConfig.mk
            echo "BOARD_MAIN_PARTITION_LIST := system vendor product" >> BoardConfig.mk
            echo "" >> BoardConfig.mk
            echo "# Recovery" >> BoardConfig.mk
            echo "BOARD_USES_RECOVERY_AS_BOOT := true" >> BoardConfig.mk
            echo "BOARD_SUPPRESS_SECURE_ERASE := true" >> BoardConfig.mk
            echo "TARGET_NO_RECOVERY := false" >> BoardConfig.mk
            echo "TARGET_RECOVERY_FSTAB := device/tecno/KI8/recovery.fstab" >> BoardConfig.mk
            echo "TARGET_RECOVERY_PIXEL_FORMAT := RGBX_8888" >> BoardConfig.mk
            echo "TARGET_USERIMAGES_USE_EXT4 := true" >> BoardConfig.mk
            echo "TARGET_USERIMAGES_USE_F2FS := true" >> BoardConfig.mk
            echo "" >> BoardConfig.mk
            echo "# OFRP Specific" >> BoardConfig.mk
            echo "OF_TARGET_DEVICE_ALT := KI8,TECNO-KI8" >> BoardConfig.mk
            echo "OF_MAINTAINER := Samuel Kendall" >> BoardConfig.mk
            echo "OF_STATUS := Unofficial" >> BoardConfig.mk
            echo "TW_THEME := portrait_hdpi" >> BoardConfig.mk
            echo "TW_BRIGHTNESS_PATH := /sys/class/leds/lcd-backlight/brightness" >> BoardConfig.mk
            echo "TW_DEFAULT_BRIGHTNESS := 1200" >> BoardConfig.mk
            echo "TW_EXCLUDE_DEFAULT_USB_INIT := true" >> BoardConfig.mk
            echo "TW_EXTRA_LANGUAGES := true" >> BoardConfig.mk
            echo "TW_INCLUDE_CRYPTO := true" >> BoardConfig.mk
            echo "TW_INCLUDE_FBE := true" >> BoardConfig.mk
            echo "TW_INCLUDE_FBE_METADATA_DECRYPT := true" >> BoardConfig.mk
            echo "TW_INCLUDE_NTFS_3G := true" >> BoardConfig.mk
            echo "TW_INCLUDE_RESETPROP := true" >> BoardConfig.mk
            echo "TW_USE_TOOLBOX := true" >> BoardConfig.mk
            echo "TW_NO_SCREEN_TIMEOUT := true" >> BoardConfig.mk
          fi
          if [ ! -f recovery.fstab ]; then
            echo "# Android fstab file for Tecno KI8" > recovery.fstab
            echo "#<src>                    <mnt_point>         <type>    <mnt_flags>               <fs_mgr_flags>" >> recovery.fstab
            echo "/dev/block/by-name/system  /system              ext4      ro,barrier=1             wait,slotselect,avb" >> recovery.fstab
            echo "/dev/block/by-name/vendor  /vendor              ext4      ro,barrier=1             wait,slotselect,avb" >> recovery.fstab
            echo "/dev/block/by-name/product /product             ext4      ro,barrier=1             wait,slotselect,avb" >> recovery.fstab
            echo "/dev/block/by-name/userdata /data               f2fs      nosuid,nodev,noatime,discard    wait,check,quota,formattable,fileencryption=ice" >> recovery.fstab
            echo "/dev/block/by-name/cache   /cache               ext4      nosuid,nodev,noatime     wait,check,formattable" >> recovery.fstab
            echo "/dev/block/by-name/metadata /metadata           ext4      nosuid,nodev,noatime     wait,formattable" >> recovery.fstab
            echo "/dev/block/by-name/boot    /boot                emmc      defaults                 defaults" >> recovery.fstab
            echo "/dev/block/by-name/recovery /recovery            emmc      defaults                 defaults" >> recovery.fstab
            echo "/dev/block/by-name/misc    /misc                emmc      defaults                 defaults" >> recovery.fstab
          fi
          if [ ! -d prebuilt ]; then
            mkdir -p prebuilt
            echo "⚠️ prebuilt folder created. Please add kernel and dtb files."
          fi
          if [ ! -d recovery/root ]; then
            mkdir -p recovery/root
            touch recovery/root/.placeholder
          fi
          echo "✅ Device tree ready!"
          echo "COMMIT_ID=$(git rev-parse --short HEAD)" >> $GITHUB_ENV

      - name: Build OrangeFox Recovery
        run: |
          cd ${GITHUB_WORKSPACE}/OrangeFox/fox_${{ env.MANIFEST_BRANCH }}
          source build/envsetup.sh
          export ALLOW_MISSING_DEPENDENCIES=true
          export FOX_USE_TWRP_RECOVERY_IMAGE_BUILDER=1
          export LC_ALL=C
          echo "📱 Available targets:"
          print_lunch_menu
          echo "🔨 Running lunch command..."
          lunch ${{ env.PRODUCT_NAME }}-eng 2>&1 | tee lunch.log
          if [ ${PIPESTATUS[0]} -ne 0 ]; then
            echo "❌ Lunch failed! Check lunch.log:"
            cat lunch.log
            exit 1
          fi
          echo "⚙️ Starting build..."
          if [[ "${{ github.event.inputs.build_type }}" == "boot" ]]; then
            mka bootimage -j$(nproc --all) 2>&1 | tee build.log
          else
            mka recoveryimage -j$(nproc --all) 2>&1 | tee build.log
          fi
          if [ ${PIPESTATUS[0]} -ne 0 ]; then
            echo "❌ Build failed! Last 50 lines of build.log:"
            tail -50 build.log
            exit 1
          fi

      - name: Find and Prepare Output Files
        run: |
          cd ${GITHUB_WORKSPACE}/OrangeFox/fox_${{ env.MANIFEST_BRANCH }}/out/target/product/
          if [ -d "KI8" ]; then cd KI8
          elif [ -d "TECNO_KI8" ]; then cd TECNO_KI8
          elif [ -d "${{ env.DEVICE_NAME }}" ]; then cd ${{ env.DEVICE_NAME }}
          else
            echo "❌ No output directory found!"
            ls -la
            exit 1
          fi
          if [ -f "recovery.img" ]; then cp recovery.img OrangeFox-recovery.img
          elif [ -f "OrangeFox*.img" ]; then cp OrangeFox*.img OrangeFox-recovery.img
          elif [ -f "boot.img" ]; then cp boot.img OrangeFox-boot.img
          else
            echo "❌ No image found!"
            ls -la *.img 2>/dev/null || echo "No .img files"
            exit 1
          fi
          echo "FILE_PATH=$(pwd)" >> $GITHUB_ENV
          echo "CHECK_IMG_IS_OK=true" >> $GITHUB_ENV

      - name: Upload to Release
        if: env.CHECK_IMG_IS_OK == 'true'
        uses: softprops/action-gh-release@v1
        with:
          files: |
            ${{ env.FILE_PATH }}/OrangeFox*.img
          name: Unofficial OrangeFox for KI8 // ${{ env.COMMIT_ID }}
          tag_name: ${{ github.run_id }}
          generate_release_notes: true
