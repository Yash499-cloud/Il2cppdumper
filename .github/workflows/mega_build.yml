name: OrangeFox - Build (Android 13 Support)

on:
  workflow_dispatch:

jobs:
  build:
    name: Build OFRP for Tecno KI8
    runs-on: ubuntu-latest
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      MANIFEST_BRANCH: '12.1'
      DEVICE_PATH: 'device/tecno/KI8'
      DEVICE_NAME: 'KI8'
      BUILD_TARGET: 'recovery'
    permissions:
      contents: write
    steps:
    - name: Checkout Repo
      uses: actions/checkout@v3

    - name: Clean-up & Space Maximize
      uses: rokibhasansagar/slimhub_actions@main

    - name: Swap Space (24GB)
      uses: pierotofy/set-swap-space@master
      with:
        swap-size-gb: 24
      
    - name: Build Environment Setup
      run: |
        sudo apt update
        git clone https://gitlab.com/OrangeFox/misc/scripts
        cd scripts
        sudo bash setup/android_build_env.sh
      
    - name: Sync OrangeFox Source
      run: |
        mkdir -p ${GITHUB_WORKSPACE}/OrangeFox
        cd ${GITHUB_WORKSPACE}/OrangeFox
        git config --global user.name "Harsh Kumar"
        git config --global user.email "harsh@kumar.com"
        git clone https://gitlab.com/OrangeFox/sync.git
        cd sync
        ./orangefox_sync.sh --branch ${{ env.MANIFEST_BRANCH }} --path ${GITHUB_WORKSPACE}/OrangeFox/fox_${{ env.MANIFEST_BRANCH }}

    - name: Extract Device Tree Zip
      run: |
        # Sahi directory mein jao
        cd ${GITHUB_WORKSPACE}/OrangeFox/fox_${{ env.MANIFEST_BRANCH }}
        
        # Device path folder banao
        mkdir -p ${{ env.DEVICE_PATH }}
        
        # Zip extract karo (Syntax Fix)
        unzip ${GITHUB_WORKSPACE}/tecno_tree.zip -d ${{ env.DEVICE_PATH }}
        
        echo "✅ Device Tree Extracted Successfully!"
        # Files check karne ke liye
        ls -F ${{ env.DEVICE_PATH }}

    - name: Building OrangeFox (Android 13 Logic)
      run: |
        cd ${GITHUB_WORKSPACE}/OrangeFox/fox_${{ env.MANIFEST_BRANCH }}
        source build/envsetup.sh
        
        # Android 13 specific flags
        export ALLOW_MISSING_DEPENDENCIES=true
        export FOX_VERSION="R11.1_A13"
        export LC_ALL=C
        
        # Lunch command
        lunch omni_${{ env.DEVICE_NAME }}-eng
        
        # Build shuru (Log ke saath)
        mka adbd ${{ env.BUILD_TARGET }}image -j$(nproc --all) 2>&1 | tee build.log

    - name: Check and Rename Recovery
      run: |
        cd ${GITHUB_WORKSPACE}/OrangeFox/fox_${{ env.MANIFEST_BRANCH }}/out/target/product/${{ env.DEVICE_NAME }}
        if [ -f recovery.img ] || [ -f OrangeFox*.img ]; then
            [ -f OrangeFox*.img ] && mv OrangeFox*.img recovery.img
            echo "BUILD_SUCCESS=true" >> $GITHUB_ENV
        else
            echo "BUILD_SUCCESS=false" >> $GITHUB_ENV
        fi

    - name: Upload Logs if Build Fails
      if: env.BUILD_SUCCESS == 'false'
      uses: actions/upload-artifact@v4
      with:
        name: build-logs-failed
        path: ${GITHUB_WORKSPACE}/OrangeFox/fox_${{ env.MANIFEST_BRANCH }}/build.log

    - name: Create Release and Upload
      uses: softprops/action-gh-release@v1
      if: env.BUILD_SUCCESS == 'true'
      with:
        files: |
          ${{ github.workspace }}/OrangeFox/fox_${{ env.MANIFEST_BRANCH }}/out/target/product/${{ env.DEVICE_NAME }}/recovery.img
          ${{ github.workspace }}/OrangeFox/fox_${{ env.MANIFEST_BRANCH }}/out/target/product/${{ env.DEVICE_NAME }}/OrangeFox*.zip
        name: OrangeFox Unofficial Android 13 for ${{ env.DEVICE_NAME }}
        tag_name: ${{ github.run_id }}
        body: |
          ### Build Successful!
          - Device: Tecno KI8
          - Android Version: 13
          - Status: Unofficial
          
