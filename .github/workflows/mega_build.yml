name: Extract Build Files

on:
  workflow_dispatch:

jobs:
  extract:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Cleanup and Mega Swap
        run: |
          sudo swapoff -a || true
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
          sudo dd if=/dev/zero of=/swapfile bs=1M count=10240
          sudo chmod 600 /swapfile
          sudo mkswap /swapfile
          sudo swapon /swapfile
          free -h

      - name: Install Repo Tool
        run: |
          mkdir -p ~/bin
          curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
          chmod a+rx ~/bin/repo
          echo "$HOME/bin" >> $GITHUB_PATH

      - name: Sync OrangeFox Source
        run: |
          mkdir -p ~/fox && cd ~/fox
          # Git Identity Setup
          git config --global user.email "harsh@kumar.com"
          git config --global user.name "Harsh Kumar"
          git config --global color.ui false
          
          # Initialize with direct branch and no tags
          ~/bin/repo init --depth=1 -u https://github.com/OrangeFoxRecovery/manifest.git -b fox_12.1 --groups=all,-notdefault,-device,-partner,-darwin,-tests
          
          # Sync with more retries
          ~/bin/repo sync -c -j$(nproc --all) --force-sync --no-clone-bundle --no-tags --quiet
          
      - name: Unzip Your Tree
        run: |
          mkdir -p ~/fox/device/tecno/KI8
          if [ -f "tecno_tree.zip" ]; then
            unzip tecno_tree.zip -d ~/fox/device/tecno/KI8
            echo "✅ Tree Unzipped Successfully"
          else
            # Agar zip 'device/tecno/KI8' ke andar repo mein hai
            find . -name "tecno_tree.zip" -exec unzip {} -d ~/fox/device/tecno/KI8 \;
          fi

      - name: Final Check & Storage Status
        run: |
          ls -R ~/fox/device/tecno/KI8 || echo "Folder not found"
          df -h /
          
