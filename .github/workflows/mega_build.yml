name: OrangeFox - Build (Automated for Tecno KI8)

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        required: true
        default: 'recovery'
        type: choice
        options:
          - recovery
          - boot
      clean_build:
        description: 'Clean build (rm -rf out)'
        required: false
        default: false
        type: boolean
  push:
    branches: [ main ]

jobs:
  build:
    name: Build OFRP for Tecno KI8
    runs-on: ubuntu-24.04
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      MANIFEST_BRANCH: '12.1'
      DEVICE_TREE: 'https://github.com/Yash499-cloud/Il2cppdumper'
      DEVICE_TREE_BRANCH: 'main'
      DEVICE_PATH: 'device/tecno/KI8'
      DEVICE_NAME: 'KI8'
      PRODUCT_NAME: 'omni_TECNO_KI8'
      DEBIAN_FRONTEND: noninteractive
    permissions:
      contents: write

    steps:
      - name: Maximize Build Space
        run: |
          sudo swapoff -a
          sudo rm -f /swapfile
          sudo docker image prune -a -f
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/share/boost /usr/lib/jvm
          sudo apt clean
          df -h

      - name: Checkout
        uses: actions/checkout@v4

      - name: Clean-up
        uses: rokibhasansagar/slimhub_actions@main

      - name: Swap Space
        uses: pierotofy/set-swap-space@master
        with:
          swap-size-gb: 24

      - name: Install Build Environment
        run: |
          set -e
          echo "⚙️ Updating package lists..."
          sudo apt update
          sudo apt install -y \
            git-core gnupg flex bison build-essential zip curl zlib1g-dev \
            gcc-multilib g++-multilib libc6-dev-i386 libncurses-dev lib32ncurses-dev \
            x11proto-core-dev libx11-dev lib32z1-dev libgl1-mesa-dev libxml2-utils \
            xsltproc unzip fontconfig python3 python3-pip openjdk-11-jdk patchelf \
            bc cpio dosfstools e2fsprogs f2fs-tools gperf libelf-dev liblz4-tool \
            libsdl1.2-dev libssl-dev lzop mkbootimg pngcrush schedtool squashfs-tools \
            libwxgtk3.2-dev

      - name: Install repo tool
        run: |
          mkdir -p ~/bin
          curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
          chmod a+x ~/bin/repo
          echo "$HOME/bin" >> $GITHUB_PATH

      - name: Clone OrangeFox Sync Script
        run: |
          mkdir -p ${GITHUB_WORKSPACE}/OrangeFox
          cd ${GITHUB_WORKSPACE}/OrangeFox
          git config --global user.name "Samuel Kendall"
          git config --global user.email "kinguser981@gmail.com"
          git clone https://gitlab.com/OrangeFox/sync.git
          cd sync
          ./orangefox_sync.sh --branch ${{ env.MANIFEST_BRANCH }} --path ${GITHUB_WORKSPACE}/OrangeFox/fox_${{ env.MANIFEST_BRANCH }}

      - name: Clean Build (if selected)
        if: github.event.inputs.clean_build == 'true'
        run: rm -rf ${GITHUB_WORKSPACE}/OrangeFox/fox_${{ env.MANIFEST_BRANCH }}/out

      - name: Clone Device Tree
        run: |
          cd ${GITHUB_WORKSPACE}/OrangeFox/fox_${{ env.MANIFEST_BRANCH }}
          rm -rf ./${{ env.DEVICE_PATH }}
          git clone ${{ env.DEVICE_TREE }} -b ${{ env.DEVICE_TREE_BRANCH }} ./${{ env.DEVICE_PATH }}
          cd ./${{ env.DEVICE_PATH }}
          rm -f vendorsetup.sh
          echo "COMMIT_ID=$(git rev-parse --short HEAD)" >> $GITHUB_ENV

      # 🔥 DEBUG STEP: Pehle lunch ki poori configuration check karo
      - name: 🔍 DEBUG - Check Device Tree Files
        run: |
          cd ${GITHUB_WORKSPACE}/OrangeFox/fox_${{ env.MANIFEST_BRANCH }}/device/tecno/KI8
          echo "=== 📄 AndroidProducts.mk ==="
          cat AndroidProducts.mk
          echo "=== 📄 omni_TECNO_KI8.mk ==="
          cat omni_TECNO_KI8.mk
          echo "=== 📄 device.mk ==="
          cat device.mk
          echo "=== 📄 BoardConfig.mk (first 20 lines) ==="
          head -20 BoardConfig.mk

      - name: Build OrangeFox Recovery
        run: |
          cd ${GITHUB_WORKSPACE}/OrangeFox/fox_${{ env.MANIFEST_BRANCH }}
          
          echo "🚀 Setting up build environment..."
          source build/envsetup.sh
          export ALLOW_MISSING_DEPENDENCIES=true
          export FOX_USE_TWRP_RECOVERY_IMAGE_BUILDER=1
          export LC_ALL=C
          
          echo "📱 Available targets:"
          print_lunch_menu
          
          # 🔥 DEBUG: Poori lunch command with full trace
          echo "🔨 Running lunch with full trace..."
          set -x  # Enable command tracing
          lunch omni_TECNO_KI8-eng 2>&1 | tee lunch.log
          set +x  # Disable tracing
          
          # Check exit status
          LUNCH_EXIT=${PIPESTATUS[0]}
          if [ $LUNCH_EXIT -ne 0 ]; then
            echo "❌ Lunch failed with exit code: $LUNCH_EXIT"
            echo "📄 Full lunch.log:"
            cat lunch.log
            
            # 🔥 EXTRA DEBUG: Check why lunch failed
            echo "🔍 Checking device directory..."
            ls -la device/tecno/KI8/
            
            echo "🔍 Checking if product name exists in AndroidProducts.mk..."
            grep -n "omni_TECNO_KI8" device/tecno/KI8/AndroidProducts.mk || echo "❌ Not found!"
            
            echo "🔍 Checking if omni_TECNO_KI8.mk exists..."
            ls -la device/tecno/KI8/omni_TECNO_KI8.mk || echo "❌ Missing!"
            
            exit 1
          fi
          
          echo "✅ Lunch successful!"
          
          echo "⚙️ Starting build..."
          if [[ "${{ github.event.inputs.build_type }}" == "boot" ]]; then
            mka bootimage -j$(nproc --all) 2>&1 | tee build.log
          else
            mka recoveryimage -j$(nproc --all) 2>&1 | tee build.log
          fi
          
          BUILD_EXIT=${PIPESTATUS[0]}
          if [ $BUILD_EXIT -ne 0 ]; then
            echo "❌ Build failed! Last 50 lines of build.log:"
            tail -50 build.log
            exit 1
          fi

      - name: Find and Prepare Output Files
        run: |
          cd ${GITHUB_WORKSPACE}/OrangeFox/fox_${{ env.MANIFEST_BRANCH }}/out/target/product/
          if [ -d "KI8" ]; then cd KI8
          elif [ -d "TECNO_KI8" ]; then cd TECNO_KI8
          elif [ -d "${{ env.DEVICE_NAME }}" ]; then cd ${{ env.DEVICE_NAME }}
          else
            echo "❌ No output directory found!"
            ls -la
            exit 1
          fi
          if [ -f "recovery.img" ]; then cp recovery.img OrangeFox-recovery.img
          elif [ -f "OrangeFox*.img" ]; then cp OrangeFox*.img OrangeFox-recovery.img
          elif [ -f "boot.img" ]; then cp boot.img OrangeFox-boot.img
          else
            echo "❌ No image found!"
            exit 1
          fi
          echo "FILE_PATH=$(pwd)" >> $GITHUB_ENV
          echo "CHECK_IMG_IS_OK=true" >> $GITHUB_ENV

      - name: Upload to Release
        if: env.CHECK_IMG_IS_OK == 'true'
        uses: softprops/action-gh-release@v1
        with:
          files: ${{ env.FILE_PATH }}/OrangeFox*.img
          name: Unofficial OrangeFox for KI8 // ${{ env.COMMIT_ID }}
          tag_name: ${{ github.run_id }}
