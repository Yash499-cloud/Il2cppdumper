name: OrangeFox - Build KI8 (Absolute-Final-Fix)

on:
  workflow_dispatch:

jobs:
  build:
    name: Build OFRP by ${{ github.actor }}
    runs-on: ubuntu-latest
    if: github.event.repository.owner.id == github.event.sender.id
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      MANIFEST_BRANCH: '12.1'
      DEVICE_TREE: 'https://github.com/Yash499-cloud/Recovery'
      DEVICE_TREE_BRANCH: 'main'
      DEVICE_PATH: 'device/tecno/KI8'
      DEVICE_NAME: 'KI8'
      BUILD_TARGET: 'recovery'
    permissions:
      contents: write

    steps:
    - name: Checkout
      uses: actions/checkout@v3

    - name: Maximize Disk Space
      uses: rokibhasansagar/slimhub_actions@main

    - name: Set Swap Space (24GB)
      uses: pierotofy/set-swap-space@master
      with:
        swap-size-gb: 24
      
    - name: Install Environment
      run: |
        sudo apt update
        sudo apt install -y git python3 bc build-essential zip curl libncurses-dev rsync wget
        git clone https://gitlab.com/OrangeFox/misc/scripts
        cd scripts && sudo bash setup/android_build_env.sh
      
    - name: Sync Source & Clone Tree (Merged Step)
      run: |
        # Step 1: Syncing
        mkdir -p ${GITHUB_WORKSPACE}/work
        cd ${GITHUB_WORKSPACE}/work
        git config --global user.name "Yash499"
        git config --global user.email "yash@example.com"
        git clone https://gitlab.com/OrangeFox/sync.git
        cd sync
        ./orangefox_sync.sh --branch ${{ env.MANIFEST_BRANCH }} --path ${GITHUB_WORKSPACE}/work/fox_${{ env.MANIFEST_BRANCH }}
        
        # Step 2: Verification (Is the folder there?)
        if [ ! -d "${GITHUB_WORKSPACE}/work/fox_${{ env.MANIFEST_BRANCH }}" ]; then
          echo "ERROR: Sync folder not created. Retrying manual directory creation..."
          mkdir -p ${GITHUB_WORKSPACE}/work/fox_${{ env.MANIFEST_BRANCH }}
        fi
        
        # Step 3: Clone Device Tree
        cd ${GITHUB_WORKSPACE}/work/fox_${{ env.MANIFEST_BRANCH }}
        git clone ${{ env.DEVICE_TREE }} -b ${{ env.DEVICE_TREE_BRANCH }} ./${{ env.DEVICE_PATH }} || echo "Tree already exists or failed to clone"

    - name: Building OrangeFox
      run: |
        # Logic: Pehle check karo folder hai ya nahi
        if [ ! -d "${GITHUB_WORKSPACE}/work/fox_${{ env.MANIFEST_BRANCH }}/build" ]; then
           echo "Build system not found. Sync probably failed."
           exit 1
        fi
        
        cd ${GITHUB_WORKSPACE}/work/fox_${{ env.MANIFEST_BRANCH }}
        source build/envsetup.sh
        export ALLOW_MISSING_DEPENDENCIES=true
        export LC_ALL=C
        
        # UI/Theme Fix
        BC_PATH="${{ env.DEVICE_PATH }}/BoardConfig.mk"
        echo "TARGET_SCREEN_HEIGHT := 2460" >> $BC_PATH
        echo "TARGET_SCREEN_WIDTH := 1080" >> $BC_PATH
        echo "TW_THEME := portrait_hdpi" >> $BC_PATH
        
        lunch twrp_${{ env.DEVICE_NAME }}-eng || lunch omni_${{ env.DEVICE_NAME }}-eng
        mka ${{ env.BUILD_TARGET }}image -j$(nproc --all)

    - name: Release Artifacts
      if: always()
      run: |
        # Intelligent search for the image file
        cd ${GITHUB_WORKSPACE}/work/fox_${{ env.MANIFEST_BRANCH }}
        FIND_IMG=$(find out/target/product/${{ env.DEVICE_NAME }} -name "OrangeFox*.img" | head -n 1)
        if [ -n "$FIND_IMG" ]; then
           mkdir -p ${GITHUB_WORKSPACE}/output
           cp $FIND_IMG ${GITHUB_WORKSPACE}/output/recovery.img
           cp out/target/product/${{ env.DEVICE_NAME }}/OrangeFox*.zip ${GITHUB_WORKSPACE}/output/ 2>/dev/null || true
           echo "FILE_READY=true" >> $GITHUB_ENV
        fi

    - name: Upload to Release
      if: env.FILE_READY == 'true'
      uses: softprops/action-gh-release@v1
      with:
        files: ${GITHUB_WORKSPACE}/output/*
        name: OrangeFox Recovery KI8 // ${{ github.run_id }}
        tag_name: ${{ github.run_id }}
        body: "Build successful for Camon 19 Neo (KI8)."
        
