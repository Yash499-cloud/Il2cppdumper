name: OrangeFox - Build KI8 (Fast-Fix)

on:
  workflow_dispatch:

jobs:
  build:
    name: Build OFRP by ${{ github.actor }}
    runs-on: ubuntu-22.04 # 24.04 ki jagah stable 22.04 use kar rahe hain
    if: github.event.repository.owner.id == github.event.sender.id
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      MANIFEST_BRANCH: '12.1'
      DEVICE_TREE: 'https://github.com/Yash499-cloud/Recovery'
      DEVICE_TREE_BRANCH: 'main'
      DEVICE_PATH: 'device/tecno/KI8'
      DEVICE_NAME: 'KI8'
      BUILD_TARGET: 'recovery'
    permissions:
      contents: write

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Maximize Disk Space
      uses: rokibhasansagar/slimhub_actions@main

    - name: Set Swap Space (24GB)
      uses: pierotofy/set-swap-space@master
      with:
        swap-size-gb: 24
      
    - name: Fast Environment Setup
      run: |
        sudo apt update
        # Sirf zaruri tools, koi upgrade ya faltu graphics nahi
        sudo apt install -y git python3 bc build-essential zip curl libncurses5 rsync wget libssl-dev
        git clone https://gitlab.com/OrangeFox/misc/scripts
        cd scripts && sudo bash setup/android_build_env.sh
      
    - name: Sync Source & Clone Tree
      run: |
        mkdir -p ${GITHUB_WORKSPACE}/work
        cd ${GITHUB_WORKSPACE}/work
        git config --global user.name "Yash499"
        git config --global user.email "yash@example.com"
        git clone https://gitlab.com/OrangeFox/sync.git
        cd sync
        ./orangefox_sync.sh --branch ${{ env.MANIFEST_BRANCH }} --path ${GITHUB_WORKSPACE}/work/fox_${{ env.MANIFEST_BRANCH }}
        
        # Move to fox root and clone tree
        cd ${GITHUB_WORKSPACE}/work/fox_${{ env.MANIFEST_BRANCH }}
        git clone ${{ env.DEVICE_TREE }} -b ${{ env.DEVICE_TREE_BRANCH }} ./${{ env.DEVICE_PATH }}

    - name: Building OrangeFox
      run: |
        cd ${GITHUB_WORKSPACE}/work/fox_${{ env.MANIFEST_BRANCH }}
        source build/envsetup.sh
        export ALLOW_MISSING_DEPENDENCIES=true
        export LC_ALL=C
        
        # KI8 specific BoardConfig fixes on-the-fly
        sed -i '/TARGET_SCREEN_HEIGHT/d' ${{ env.DEVICE_PATH }}/BoardConfig.mk
        echo "TARGET_SCREEN_HEIGHT := 2460" >> ${{ env.DEVICE_PATH }}/BoardConfig.mk
        echo "TARGET_SCREEN_WIDTH := 1080" >> ${{ env.DEVICE_PATH }}/BoardConfig.mk
        echo "TW_THEME := portrait_hdpi" >> ${{ env.DEVICE_PATH }}/BoardConfig.mk
        
        lunch twrp_${{ env.DEVICE_NAME }}-eng || lunch omni_${{ env.DEVICE_NAME }}-eng
        mka ${{ env.BUILD_TARGET }}image -j$(nproc --all)

    - name: Release Files
      if: always()
      run: |
        cd ${GITHUB_WORKSPACE}/work/fox_${{ env.MANIFEST_BRANCH }}
        OUT_PATH="out/target/product/${{ env.DEVICE_NAME }}"
        if [ -f $OUT_PATH/OrangeFox*.img ]; then
           mkdir -p ${GITHUB_WORKSPACE}/upload
           cp $OUT_PATH/OrangeFox*.img ${GITHUB_WORKSPACE}/upload/
           cp $OUT_PATH/OrangeFox*.zip ${GITHUB_WORKSPACE}/upload/
           echo "BUILD_OK=true" >> $GITHUB_ENV
        fi

    - name: Upload to Release
      if: env.BUILD_OK == 'true'
      uses: softprops/action-gh-release@v2
      with:
        files: ${GITHUB_WORKSPACE}/upload/*
        name: OrangeFox KI8 Final // ${{ github.run_id }}
        tag_name: ${{ github.run_id }}
        
