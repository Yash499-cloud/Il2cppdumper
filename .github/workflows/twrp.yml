name: Recovery Build Self-Healing Final

on:
  workflow_dispatch:

env:
  MANIFEST_URL: "https://github.com/minimal-manifest-twrp/platform_manifest_twrp_aosp.git"
  MANIFEST_BRANCH: "twrp-12.1"
  DEVICE_TREE_URL: "https://github.com/Yash499-cloud/Il2cppdumper"
  DEVICE_TREE_BRANCH: "main"
  DEVICE_NAME: "TECNO_KI8"

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Cleanup & Environment
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/local/share/boost
          sudo apt-get update
          sudo apt-get install -y gperf gcc-multilib gcc-10-multilib g++-multilib g++-10-multilib libc6-dev libncurses5-dev x11proto-core-dev libx11-dev lib32z1-dev libgl1-mesa-dev libxml2-utils xsltproc unzip fontconfig libncurses-dev git python3
          mkdir -p ~/bin && curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
          chmod a+x ~/bin/repo && sudo ln -sf ~/bin/repo /usr/bin/repo

      - name: Sync Source
        run: |
          mkdir -p ~/fox && cd ~/fox
          repo init --depth=1 -u ${{ env.MANIFEST_URL }} -b ${{ env.MANIFEST_BRANCH }}
          repo sync -c -j$(nproc --all) --force-sync --no-tags --no-clone-bundle

      - name: Setup & Self-Heal Device Tree
        run: |
          cd ~/fox
          CLEAN_NAME=$(echo "${{ env.DEVICE_NAME }}" | sed 's/-/_/g')
          git clone ${{ env.DEVICE_TREE_URL }} -b ${{ env.DEVICE_TREE_BRANCH }} device/tecno/$CLEAN_NAME
          
          cd device/tecno/$CLEAN_NAME

          # Healer 1: Windows line endings & Path sanitization
          find . -type f -name "*.mk" -exec sed -i 's/\r//' {} +
          find . -type f -name "*.mk" -exec sed -i 's/vendor\/omni/vendor\/twrp/g' {} +
          
          # Healer 2: Remove Obsolete Flags from ALL files
          find . -type f -name "*.mk" -exec sed -i '/PRODUCT_STATIC_BOOT_CONTROL_HAL/d' {} +
          find . -type f -name "*.mk" -exec sed -i '/add_lunch_combo/d' {} +

          # Healer 3: Fix AndroidProducts.mk (Standard Format)
          cat <<EOF > AndroidProducts.mk
          PRODUCT_MAKEFILES := \$(LOCAL_DIR)/omni_$CLEAN_NAME.mk
          COMMON_LUNCH_CHOICES := omni_$CLEAN_NAME-userdebug
          EOF

          # Healer 4: Vendorsetup (Clean)
          echo "add_lunch_combo omni_$CLEAN_NAME-userdebug" > vendorsetup.sh
          
          # Healer 5: BoardConfig Force Architecture
          {
            echo "TARGET_ARCH := arm64"
            echo "TARGET_ARCH_VARIANT := armv8-a"
            echo "TARGET_CPU_VARIANT := generic"
            echo "TARGET_2ND_ARCH := arm"
            echo "TARGET_SUPPORTS_64_BIT_APPS := true"
            echo "BUILD_BROKEN_DUP_RULES := true"
            echo "BUILD_BROKEN_ELF_PREBUILT_PRODUCT_COPY_FILES := true"
            echo "ALLOW_MISSING_DEPENDENCIES := true"
          } >> BoardConfig.mk

      - name: Build Recovery (Force Mode)
        run: |
          cd ~/fox
          export ALLOW_MISSING_DEPENDENCIES=true
          source build/envsetup.sh
          CLEAN_NAME=$(echo "${{ env.DEVICE_NAME }}" | sed 's/-/_/g')
          
          lunch omni_$CLEAN_NAME-userdebug || (echo "Lunch failed" && exit 1)
          
          # Ninja Bypass: Clear intermediates to force rebuild
          rm -rf out/target/product/$CLEAN_NAME/obj/PACKAGING/recovery_patch_intermediates
          
          # Main Build Command
          make clean
          make recoveryimage -j$(nproc --all)

      - name: Deep Search & Collect Artifacts
        if: always()
        run: |
          cd ~/fox
          CLEAN_NAME=$(echo "${{ env.DEVICE_NAME }}" | sed 's/-/_/g')
          mkdir -p ~/outputs
          
          # Standard Folder Check
          cp out/target/product/$CLEAN_NAME/recovery.img ~/outputs/ 2>/dev/null || echo "Standard path failed"
          
          # Deep Search (Agar standard path fail ho jaye)
          echo "Scanning for recovery.img..."
          find out/ -name "recovery.img" -exec cp {} ~/outputs/ \;
          find out/ -name "OrangeFox*.zip" -exec cp {} ~/outputs/ \;
          find out/ -name "twrp*.img" -exec cp {} ~/outputs/ \;
          
          # List files for debugging
          ls -R ~/outputs/

      - name: Upload Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Recovery-Final-Package
          path: ~/outputs/*
          
