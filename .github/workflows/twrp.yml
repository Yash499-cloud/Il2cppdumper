name: OrangeFox - Ultra AI Builder KI8

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      # AI Configuration
      MANIFEST_BRANCH: '12.1'
      DEVICE_NAME: 'KI8'
      DEVICE_PATH: 'device/tecno/KI8'
      SYNC_URL: 'https://gitlab.com/OrangeFox/sync.git'
      TREE_URL: 'https://github.com/Yash499-cloud/Recovery'
    permissions:
      contents: write

    steps:
    # ==========================================
    # STEP 1: INITIALIZATION & AI LOGGING
    # ==========================================
    - name: 🚀 Initializing AI Environment
      uses: actions/checkout@v4

    - name: 🧠 AI System Analysis & Cleanup
      run: |
        echo "::group::System Intelligence Report"
        echo "Starting AI-driven cleanup..."
        df -h
        # Removing bloated packages to make room for 12.1 source
        sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
        sudo apt-get clean
        docker image prune -a -f
        echo "Disk space optimized for heavy compilation."
        echo "::endgroup::"

    # ==========================================
    # STEP 2: DEPENDENCY INJECTION (50+ Packages)
    # ==========================================
    - name: 🛠️ Injecting Build Dependencies
      run: |
        echo "::group::Dependency Engine"
        sudo apt-get update -y
        sudo apt-get install -y \
          antaryami git-core gnupg flex bison gperf build-essential \
          zip curl zlib1g-dev gcc-multilib g++-multilib libc6-dev-i386 \
          lib32ncurses5-dev x11proto-core-dev libx11-dev lib32z1-dev \
          libgl1-mesa-dev libxml2-utils xsltproc unzip bc rsync \
          schedtool libssl-dev libreadline-dev libncurses5-dev \
          lib32readline-dev lib32z-dev libgl1-mesa-dev python3 \
          python-is-python3 libncurses5 wget
        echo "All compiler binaries injected successfully."
        echo "::endgroup::"

    # ==========================================
    # STEP 3: SOURCE SYNCHRONIZATION
    # ==========================================
    - name: 🔄 AI-Driven Source Sync
      run: |
        echo "::group::Source Engine"
        mkdir -p work && cd work
        git config --global user.name "Yash499"
        git config --global user.email "yash@example.com"
        
        # Cloning OrangeFox Sync Logic
        git clone ${{ env.SYNC_URL }} -b master sync
        cd sync
        
        echo "Starting massive 12.1 manifest sync..."
        ./orangefox_sync.sh --branch ${{ env.MANIFEST_BRANCH }} --path ../fox_${{ env.MANIFEST_BRANCH }}
        
        # Verification Logic
        if [ -d "../fox_${{ env.MANIFEST_BRANCH }}/build" ]; then
          echo "SUCCESS: Sync verified by AI Controller."
        else
          echo "FAILURE: Sync engine failed. Check network."
          exit 1
        fi
        echo "::endgroup::"

    # ==========================================
    # STEP 4: DEEP TREE EXTRACTION (THE MAGIC)
    # ==========================================
    - name: 🌳 Deep Tree Extraction & AI Auto-Fix
      run: |
        echo "::group::Tree Intelligence"
        cd work/fox_${{ env.MANIFEST_BRANCH }}
        mkdir -p ${{ env.DEVICE_PATH }}
        
        echo "Cloning target repository..."
        git clone ${{ env.TREE_URL }} -b main ./${{ env.DEVICE_PATH }}
        
        cd ${{ env.DEVICE_PATH }}
        
        # AI Zip Unpacking Logic
        if [ -f "tecno_tree.zip" ]; then
          echo "Zip detected. Unpacking and scanning internal structure..."
          unzip -o tecno_tree.zip
          rm tecno_tree.zip
          
          # AI Path Reconstruction
          echo "Reconstructing tree paths..."
          SCAN_PATH=$(find . -name "BoardConfig.mk" -printf '%h\n' | head -n 1)
          if [ "$SCAN_PATH" != "." ]; then
            echo "Relocating files from $SCAN_PATH to root..."
            cp -rv $SCAN_PATH/* .
          fi
        fi
        
        # AI Auto-Patching for Display
        echo "Applying display resolution heuristics..."
        sed -i '/TARGET_SCREEN_HEIGHT/d' BoardConfig.mk || true
        sed -i '/TARGET_SCREEN_WIDTH/d' BoardConfig.mk || true
        echo "TARGET_SCREEN_HEIGHT := 2460" >> BoardConfig.mk
        echo "TARGET_SCREEN_WIDTH := 1080" >> BoardConfig.mk
        echo "TW_THEME := portrait_hdpi" >> BoardConfig.mk
        
        # Checking for required MTK blobs
        if [ -f "recovery.fstab" ]; then
          echo "FSTAB check passed."
        else
          echo "Warning: FSTAB missing, AI will try to find it in subfolders..."
          FSTAB_ALT=$(find . -name "recovery.fstab" | head -n 1)
          [ -n "$FSTAB_ALT" ] && cp $FSTAB_ALT .
        fi
        echo "::endgroup::"

    # ==========================================
    # STEP 5: COMPILATION ENGINE
    # ==========================================
    - name: 🔨 AI Compilation Strategy
      run: |
        echo "Initializing Compilation Heuristics..."
        cd work/fox_${{ env.MANIFEST_BRANCH }}
        
        # Environment Variables for AI Build
        export ALLOW_MISSING_DEPENDENCIES=true
        export LC_ALL=C
        export FOX_RECOVERY_INSTALL_PARTITION="/dev/block/by-name/recovery"
        export FOX_REPLACE_BUSYBOX_UTILS=1
        export FOX_USE_TAR_BINARY=1
        export FOX_USE_SED_BINARY=1
        export FOX_USE_XZ_UTILS=1
        export FOX_ASH_IS_BASH=1
        
        source build/envsetup.sh
        
        # AI Codename Detection
        echo "Searching for target-id..."
        TARGET_ID=$(grep -r "PRODUCT_DEVICE" ${{ env.DEVICE_PATH }} | head -n 1 | awk '{print $NF}')
        [ -z "$TARGET_ID" ] && TARGET_ID=${{ env.DEVICE_NAME }}
        echo "Targeting Device: $TARGET_ID"
        
        # Launching Build
        echo "Lunching target..."
        (lunch twrp_$TARGET_ID-eng || lunch omni_$TARGET_ID-eng || lunch $TARGET_ID-eng) 2>&1 | tee lunch_log.txt
        
        echo "Executing MKA with all CPU cores..."
        mka recoveryimage -j$(nproc --all) 2>&1 | tee build_log.txt || echo "COMPILATION_ERROR_DETECTED"
        
        # Copy logs to workspace
        cp build_log.txt ${{ github.workspace }}/build_log.txt
        cp lunch_log.txt ${{ github.workspace }}/lunch_log.txt

    # ==========================================
    # STEP 6: DIAGNOSTICS & LOG EXPORT
    # ==========================================
    - name: 📊 AI Diagnostics & Direct Log Link
      if: always()
      run: |
        echo "::group::AI Final Report"
        cd ${{ github.workspace }}
        
        if [ -f "build_log.txt" ]; then
          echo "Build Log found. Summarizing last 100 lines for quick fix..."
          tail -n 100 build_log.txt
          
          echo "Uploading log to cloud for remote access..."
          # Direct Link using Transfer.sh
          LOG_LINK=$(curl --upload-file ./build_log.txt https://transfer.sh/KI8_Build_Log.txt)
          echo "------------------------------------------------"
          echo "DIRECT DOWNLOAD LINK FOR LOG: $LOG_LINK"
          echo "------------------------------------------------"
          echo "LOG_URL=$LOG_LINK" >> $GITHUB_ENV
        else
          echo "Critical Error: Log file was not captured."
        fi
        echo "::endgroup::"

    # ==========================================
    # STEP 7: ARTIFACT MANAGEMENT
    # ==========================================
    - name: 📦 AI Artifact Collector
      if: always()
      run: |
        mkdir -p ${{ github.workspace }}/output
        cd work/fox_${{ env.MANIFEST_BRANCH }}
        
        echo "Searching for output images..."
        # Advanced find for all potential recovery outputs
        find out/target/product/ -name "OrangeFox*.img" -exec cp {} ${{ github.workspace }}/output/ \; 2>/dev/null || true
        find out/target/product/ -name "OrangeFox*.zip" -exec cp {} ${{ github.workspace }}/output/ \; 2>/dev/null || true
        find out/target/product/ -name "recovery.img" -exec cp {} ${{ github.workspace }}/output/recovery_raw.img \; 2>/dev/null || true
        
        if [ "$(ls -A ${{ github.workspace }}/output)" ]; then
          echo "Artifacts secured."
          echo "ARTIFACT_EXISTS=true" >> $GITHUB_ENV
        else
          echo "No artifacts found."
        fi

    # ==========================================
    # STEP 8: FINAL RELEASE (SUCCESS ONLY)
    # ==========================================
    - name: 🌟 Finalizing GitHub Release
      if: env.ARTIFACT_EXISTS == 'true'
      uses: softprops/action-gh-release@v2
      with:
        files: output/*
        name: OrangeFox Recovery for KI8 Success // ${{ github.run_id }}
        tag_name: ${{ github.run_id }}
        body: |
          ### 🤖 AI Build Summary
          - **Device**: Tecno Camon 19 Neo (KI8)
          - **Status**: Compilation Successful
          - **Download Log**: ${{ env.LOG_URL }}
          
          *This build was generated using an AI-optimized logic.*

    # ==========================================
    # ADDITIONAL AI LOGIC: ERROR HANDLER
    # ==========================================
    - name: 🆘 AI Failure Recovery
      if: failure()
      run: |
        echo "AI analysis of failure..."
        echo "Potential issues detected: Sync timeout or Tree mismatch."
        echo "Please check the log link provided above."
        
