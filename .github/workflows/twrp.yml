name: Recovery Build FINAL EMERGENCY FIX

on:
  workflow_dispatch:

env:
  MANIFEST_URL: "https://github.com/minimal-manifest-twrp/platform_manifest_twrp_aosp.git"
  MANIFEST_BRANCH: "twrp-12.1"
  DEVICE_TREE_URL: "https://github.com/Yash499-cloud/Il2cppdumper"
  DEVICE_TREE_BRANCH: "main"
  DEVICE_NAME: "TECNO_KI8"

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Cleanup & Environment
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/local/share/boost
          sudo apt-get update
          sudo apt-get install -y gperf gcc-multilib gcc-10-multilib g++-multilib g++-10-multilib libc6-dev libncurses5-dev x11proto-core-dev libx11-dev lib32z1-dev libgl1-mesa-dev libxml2-utils xsltproc unzip fontconfig libncurses-dev git python3
          mkdir -p ~/bin && curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
          chmod a+x ~/bin/repo && sudo ln -sf ~/bin/repo /usr/bin/repo

      - name: Sync Source
        run: |
          mkdir -p ~/fox && cd ~/fox
          repo init --depth=1 -u ${{ env.MANIFEST_URL }} -b ${{ env.MANIFEST_BRANCH }}
          repo sync -c -j$(nproc --all) --force-sync --no-tags --no-clone-bundle

      - name: Force Fix Device Tree
        run: |
          cd ~/fox
          CLEAN_NAME=$(echo "${{ env.DEVICE_NAME }}" | sed 's/-/_/g')
          git clone ${{ env.DEVICE_TREE_URL }} -b ${{ env.DEVICE_TREE_BRANCH }} device/tecno/$CLEAN_NAME || true
          
          cd device/tecno/$CLEAN_NAME

          # Sab delete karo jo error de raha hai
          rm -f device.mk AndroidProducts.mk vendorsetup.sh omni_$CLEAN_NAME.mk

          # Naya Clean device.mk
          echo "LOCAL_PATH := device/tecno/$CLEAN_NAME" > device.mk
          echo "PRODUCT_COPY_FILES += \$(LOCAL_PATH)/recovery.fstab:recovery/root/etc/recovery.fstab" >> device.mk

          # Naya Clean AndroidProducts.mk
          echo "PRODUCT_MAKEFILES := \$(LOCAL_DIR)/omni_$CLEAN_NAME.mk" > AndroidProducts.mk
          echo "COMMON_LUNCH_CHOICES := omni_$CLEAN_NAME-userdebug" >> AndroidProducts.mk

          # Naya Clean omni_TECNO_KI8.mk
          cat <<EOF > omni_$CLEAN_NAME.mk
          \$(call inherit-product, \$(SRC_TARGET_DIR)/product/core_64_bit.mk)
          \$(call inherit-product, \$(SRC_TARGET_DIR)/product/full_base_telephony.mk)
          \$(call inherit-product, vendor/twrp/config/common.mk)
          \$(call inherit-product, \$(LOCAL_PATH)/device.mk)
          PRODUCT_DEVICE := $CLEAN_NAME
          PRODUCT_NAME := omni_$CLEAN_NAME
          PRODUCT_BRAND := Tecno
          PRODUCT_MODEL := $CLEAN_NAME
          PRODUCT_MANUFACTURER := Tecno
          EOF

          # BoardConfig Fix
          sed -i '/PRODUCT_STATIC_BOOT_CONTROL_HAL/d' BoardConfig.mk
          echo "TARGET_SUPPORTS_64_BIT_APPS := true" >> BoardConfig.mk
          echo "ALLOW_MISSING_DEPENDENCIES := true" >> BoardConfig.mk

      - name: Build Recovery
        run: |
          cd ~/fox
          sudo swapoff -a || true
          sudo fallocate -l 4G /swapfile && sudo chmod 600 /swapfile && sudo mkswap /swapfile && sudo swapon /swapfile
          
          source build/envsetup.sh
          CLEAN_NAME=$(echo "TECNO_KI8" | sed 's/-/_/g')
          
          export ALLOW_MISSING_DEPENDENCIES=true
          lunch omni_$CLEAN_NAME-userdebug || (echo "Lunch failed" && exit 1)
          
          # Force Ninja to build recovery
          make recoveryimage -j$(nproc --all)

      - name: Collect & Upload
        if: always()
        run: |
          mkdir -p ~/outputs
          find ~/fox/out/target/product/ -name "recovery.img" -exec cp {} ~/outputs/ \;
          ls -R ~/outputs/
          
      - name: Upload Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Recovery-Final-Result
          path: ~/outputs/*
          
