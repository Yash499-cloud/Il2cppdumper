name: Recovery Build

on:
  workflow_dispatch:

env:
  MANIFEST_URL: "https://github.com/minimal-manifest-twrp/platform_manifest_twrp_aosp.git"
  MANIFEST_BRANCH: "twrp-12.1"
  DEVICE_TREE_URL: "https://github.com/Yash499-cloud/Il2cppdumper"
  DEVICE_TREE_BRANCH: "main"
  DEVICE_NAME: "TECNO_KI8"
  BUILD_TARGET: "recovery"

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cleanup Space
        uses: rokibhasansagar/slimhub_actions@main

      - name: Set up Environment
        run: |
          sudo apt-get update
          sudo apt-get install -y gperf gcc-multilib gcc-10-multilib g++-multilib g++-10-multilib libc6-dev libncurses5-dev x11proto-core-dev libx11-dev lib32z1-dev libgl1-mesa-dev libxml2-utils xsltproc unzip fontconfig libncurses-dev

      - name: Install Repo Tool
        run: |
          mkdir -p ~/bin
          curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
          chmod a+x ~/bin/repo
          sudo ln -sf ~/bin/repo /usr/bin/repo

      - name: Sync Source
        run: |
          git config --global user.email "gh-actions@github.com"
          git config --global user.name "GitHub Actions"
          mkdir -p ~/fox && cd ~/fox
          repo init --depth=1 -u ${{ env.MANIFEST_URL }} -b ${{ env.MANIFEST_BRANCH }}
          repo sync -c -j$(nproc --all) --force-sync --no-tags --no-clone-bundle

      - name: AI-Style Device Tree Fixer
        run: |
          cd ~/fox
          # 1. Smart Cloning
          git clone ${{ env.DEVICE_TREE_URL }} -b ${{ env.DEVICE_TREE_BRANCH }} device/tecno/${{ env.DEVICE_NAME }} || true
          DT_PATH="device/tecno/${{ env.DEVICE_NAME }}"
          
          # 2. Folder Structural Fix (If nested)
          if [ -d "$DT_PATH/TECNO-KI8" ]; then
            mv $DT_PATH/TECNO-KI8/* $DT_PATH/
          fi

          # 3. SELF-HEALING: Remove references to non-existent files
          echo "Scanning for broken inclusions..."
          find $DT_PATH -type f -name "*.mk" | xargs sed -i '/vendor\/omni/d'
          find $DT_PATH -type f -name "*.mk" | xargs sed -i '/PRODUCT_STATIC_BOOT_CONTROL_HAL/d'
          
          # 4. Global Rename (Dash to Underscore)
          find $DT_PATH -type f -exec sed -i 's/TECNO-KI8/TECNO_KI8/g' {} +
          mv $DT_PATH/omni_TECNO-KI8.mk $DT_PATH/omni_${{ env.DEVICE_NAME }}.mk || true

          # 5. Force-generate missing AndroidProducts.mk
          cat <<EOF > $DT_PATH/AndroidProducts.mk
          PRODUCT_MAKEFILES := \$(LOCAL_DIR)/omni_${{ env.DEVICE_NAME }}.mk
          COMMON_LUNCH_CHOICES := omni_${{ env.DEVICE_NAME }}-userdebug
          EOF

      - name: Build
        run: |
          cd ~/fox
          export ALLOW_MISSING_DEPENDENCIES=true
          export LC_ALL=C
          source build/envsetup.sh
          lunch omni_${{ env.DEVICE_NAME }}-userdebug
          mka ${{ env.BUILD_TARGET }}image -j$(nproc --all)

      - name: Upload Result
        uses: actions/upload-artifact@v4
        with:
          name: Recovery-Image
          path: /home/runner/fox/out/target/product/TECNO_KI8/*.img
          
