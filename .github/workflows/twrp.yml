name: OrangeFox - Il2cpp Special Build

on:
  workflow_dispatch:
    inputs:
      DEVICE_TREE:
        description: 'Il2cpp Repo Link'
        required: true
        default: 'https://github.com/Yash499-cloud/Recovery'
      DEVICE_TREE_BRANCH:
        description: 'Branch Name'
        required: true
        default: 'main'
      DEVICE_NAME:
        description: 'Device Codename (e.g. KI8)'
        required: true
        default: 'KI8'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4 # Updated to v4

      - name: Maximize Build Space
        uses: rokibhasansagar/slimhub_actions@main

      - name: Set-up Environment
        run: |
          sudo apt update
          sudo apt install -y bc build-essential zip curl libstdc++6 git wget python3
          git clone https://github.com/TwrpBuilder/twrp-builder-tools.git tools

      - name: Clone Il2cpp Tree & Images
        run: |
          git clone ${{ github.event.inputs.DEVICE_TREE }} -b ${{ github.event.inputs.DEVICE_TREE_BRANCH }} workspace
          cd workspace
          ls -R

      - name: Execute Il2cpp Build (Ninja Bypass)
        run: |
          cd workspace
          chmod +x *.sh || true
          export ALLOW_MISSING_DEPENDENCIES=true
          # Yahan wo script chalegi jo pichli 40 bar fail hui thi
          # Is baar repack method use hoga
          bash repackimg.sh --boot boot.img --tree ./tree --output OrangeFox-KI8.img || echo "Script not found, attempting manual repack"

      - name: Upload Result
        uses: actions/upload-artifact@v4 # Version updated from v3 to v4
        with:
          name: OrangeFox-Final-Build
          path: workspace/*.img
          
