name: Recovery Build

on:
  workflow_dispatch:

env:
  MANIFEST_URL: "https://github.com/minimal-manifest-twrp/platform_manifest_twrp_aosp.git"
  MANIFEST_BRANCH: "twrp-12.1"
  DEVICE_TREE_URL: "https://github.com/Yash499-cloud/Il2cppdumper"
  DEVICE_TREE_BRANCH: "main"
  DEVICE_PATH: "device/tecno/TECNO-KI8"
  DEVICE_NAME: "TECNO_KI8" # Dash ko underscore se badla
  MAKEFILE_NAME: "omni_TECNO_KI8"
  BUILD_TARGET: "recovery"

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cleanup Space
        uses: rokibhasansagar/slimhub_actions@main

      - name: Set up Environment
        run: |
          sudo apt-get update
          sudo apt-get install -y gperf gcc-multilib gcc-10-multilib g++-multilib g++-10-multilib libc6-dev libncurses5-dev x11proto-core-dev libx11-dev lib32z1-dev libgl1-mesa-dev libxml2-utils xsltproc unzip fontconfig libncurses-dev

      - name: Install Repo Tool
        run: |
          mkdir -p ~/bin
          curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
          chmod a+x ~/bin/repo
          sudo ln -sf ~/bin/repo /usr/bin/repo

      - name: Sync Source
        run: |
          git config --global user.email "gh-actions@github.com"
          git config --global user.name "GitHub Actions"
          mkdir -p ~/fox && cd ~/fox
          repo init --depth=1 -u ${{ env.MANIFEST_URL }} -b ${{ env.MANIFEST_BRANCH }}
          repo sync -c -j$(nproc --all) --force-sync --no-tags --no-clone-bundle

      - name: Clone Device Tree
        run: |
          cd ~/fox
          git clone ${{ env.DEVICE_TREE_URL }} -b ${{ env.DEVICE_TREE_BRANCH }} ${{ env.DEVICE_PATH }}

      - name: Fix Device Tree Files
        run: |
          cd ~/fox/${{ env.DEVICE_PATH }}
          # Rename files to remove problematic dash
          mv omni_TECNO-KI8.mk omni_TECNO_KI8.mk || true
          # Replace all dashes with underscores in the makefiles
          sed -i 's/TECNO-KI8/TECNO_KI8/g' AndroidProducts.mk || true
          sed -i 's/TECNO-KI8/TECNO_KI8/g' omni_TECNO_KI8.mk || true
          sed -i 's/TECNO-KI8/TECNO_KI8/g' vendorsetup.sh || true

      - name: Build
        run: |
          cd ~/fox
          export ALLOW_MISSING_DEPENDENCIES=true
          source build/envsetup.sh
          lunch ${{ env.MAKEFILE_NAME }}-userdebug
          mka ${{ env.BUILD_TARGET }}image -j$(nproc --all)

      - name: Upload Result
        uses: actions/upload-artifact@v4
        with:
          name: Recovery-Image
          path: /home/runner/fox/out/target/product/TECNO_KI8/recovery.img
          
      - name: Sync Source
        run: |
          git config --global user.email "gh-actions@github.com"
          git config --global user.name "GitHub Actions"
          mkdir -p ~/fox && cd ~/fox
          repo init --depth=1 -u ${{ env.MANIFEST_URL }} -b ${{ env.MANIFEST_BRANCH }}
          repo sync -c -j$(nproc --all) --force-sync --no-tags --no-clone-bundle

      - name: Clone Device Tree
        run: |
          cd ~/fox
          git clone ${{ env.DEVICE_TREE_URL }} -b ${{ env.DEVICE_TREE_BRANCH }} ${{ env.DEVICE_PATH }}

      - name: Fix Device Tree Errors
        run: |
          cd ~/fox/${{ env.DEVICE_PATH }}
          # Fix common naming issues in AndroidProducts.mk
          sed -i 's/omni_TECNO-KI8-user/omni_TECNO-KI8-userdebug/g' AndroidProducts.mk || true
          sed -i 's/omni_TECNO-KI8-eng/omni_TECNO-KI8-userdebug/g' AndroidProducts.mk || true

      - name: Build
        run: |
          cd ~/fox
          export ALLOW_MISSING_DEPENDENCIES=true
          source build/envsetup.sh
          # Hum direct 'lunch' command manually denge variant ke sath
          lunch ${{ env.MAKEFILE_NAME }}-userdebug
          mka ${{ env.BUILD_TARGET }}image -j$(nproc --all)

      - name: Upload Result
        uses: actions/upload-artifact@v4
        with:
          name: Recovery-Image
          path: /home/runner/fox/out/target/product/${{ env.DEVICE_NAME }}/recovery.img
          
      - name: Sync Source
        run: |
          git config --global user.email "gh-actions@github.com"
          git config --global user.name "GitHub Actions"
          mkdir -p ~/fox && cd ~/fox
          repo init --depth=1 -u ${{ env.MANIFEST_URL }} -b ${{ env.MANIFEST_BRANCH }}
          repo sync -c -j$(nproc --all) --force-sync --no-tags --no-clone-bundle

      - name: Clone Device Tree
        run: |
          cd ~/fox
          git clone ${{ env.DEVICE_TREE_URL }} -b ${{ env.DEVICE_TREE_BRANCH }} ${{ env.DEVICE_PATH }}

      - name: Build
        run: |
          cd ~/fox
          export ALLOW_MISSING_DEPENDENCIES=true
          source build/envsetup.sh
          lunch ${{ env.MAKEFILE_NAME }}-eng
          mka ${{ env.BUILD_TARGET }}image -j$(nproc --all)

      - name: Upload Result
        uses: actions/upload-artifact@v4
        with:
          name: Recovery-Image
          path: /home/runner/fox/out/target/product/${{ env.DEVICE_NAME }}/recovery.img
          
