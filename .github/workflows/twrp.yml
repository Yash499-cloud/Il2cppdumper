name: OrangeFox - Build KI8 (Final-Polished)

on:
  workflow_dispatch:

jobs:
  build:
    name: Build OFRP by ${{ github.actor }}
    runs-on: ubuntu-latest
    if: github.event.repository.owner.id == github.event.sender.id
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      MANIFEST_BRANCH: '12.1'
      DEVICE_TREE: 'https://github.com/Yash499-cloud/Recovery'
      DEVICE_TREE_BRANCH: 'main'
      DEVICE_PATH: 'device/tecno/KI8'
      DEVICE_NAME: 'KI8'
      BUILD_TARGET: 'recovery'
    permissions:
      contents: write

    steps:
    - name: Checkout
      uses: actions/checkout@v3

    - name: Clean-up & Swap
      run: |
        docker image prune -a -f
        sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
    
    - name: Set Swap Space
      uses: pierotofy/set-swap-space@master
      with:
        swap-size-gb: 24
      
    - name: Build Environment Setup
      run: |
        sudo apt update
        sudo apt install -y git python3 bc build-essential zip curl libncurses-dev rsync
        git clone https://gitlab.com/OrangeFox/misc/scripts
        cd scripts && sudo bash setup/android_build_env.sh
      
    - name: Set-up Manifest & Clone Tree
      run: |
        mkdir -p ${GITHUB_WORKSPACE}/OrangeFox
        cd ${GITHUB_WORKSPACE}/OrangeFox
        git config --global user.name "Yash499"
        git config --global user.email "yash@example.com"
        git clone https://gitlab.com/OrangeFox/sync.git
        cd sync
        ./orangefox_sync.sh --branch ${{ env.MANIFEST_BRANCH }} --path ${GITHUB_WORKSPACE}/OrangeFox/fox_${{ env.MANIFEST_BRANCH }}
        
        # Merge Step: Clone Tree immediately after Sync
        cd ${GITHUB_WORKSPACE}/OrangeFox/fox_${{ env.MANIFEST_BRANCH }}
        git clone ${{ env.DEVICE_TREE }} -b ${{ env.DEVICE_TREE_BRANCH }} ./${{ env.DEVICE_PATH }}
        
        # Inject BoardConfig Fixes
        BC_PATH="${{ env.DEVICE_PATH }}/BoardConfig.mk"
        if [ -f "$BC_PATH" ]; then
          echo "TARGET_SCREEN_HEIGHT := 2460" >> $BC_PATH
          echo "TARGET_SCREEN_WIDTH := 1080" >> $BC_PATH
          echo "TW_THEME := portrait_hdpi" >> $BC_PATH
        fi

    - name: Building OrangeFox
      run: |
        cd ${GITHUB_WORKSPACE}/OrangeFox/fox_${{ env.MANIFEST_BRANCH }}
        # Set environment variables inside the same shell
        export ALLOW_MISSING_DEPENDENCIES=true
        export LC_ALL=C
        source build/envsetup.sh
        
        # Try lunch and build
        lunch twrp_${{ env.DEVICE_NAME }}-eng || lunch omni_${{ env.DEVICE_NAME }}-eng
        
        # build without cleaning if it's a fresh sync to save time
        mka ${{ env.BUILD_TARGET }}image -j$(nproc --all)

    - name: Check & Release
      if: always()
      run: |
        cd ${GITHUB_WORKSPACE}/OrangeFox/fox_${{ env.MANIFEST_BRANCH }}
        OUT_PATH="out/target/product/${{ env.DEVICE_NAME }}"
        if [ -f $OUT_PATH/OrangeFox*.img ]; then
            echo "CHECK_IMG_IS_OK=true" >> $GITHUB_ENV
            echo "FILE_PATH=${GITHUB_WORKSPACE}/OrangeFox/fox_${{ env.MANIFEST_BRANCH }}/$OUT_PATH" >> $GITHUB_ENV
        else
            echo "Build failed to generate image."
            exit 1
        fi

    - name: Upload to Release
      if: env.CHECK_IMG_IS_OK == 'true'
      uses: softprops/action-gh-release@v1
      with:
        files: |
          ${{ env.FILE_PATH }}/OrangeFox*.img
          ${{ env.FILE_PATH }}/OrangeFox*.zip
        name: OrangeFox Recovery KI8 // ${{ github.run_id }}
        tag_name: ${{ github.run_id }}
        body: "Successfully built for Camon 19 Neo (KI8)."
        
