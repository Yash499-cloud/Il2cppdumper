name: OrangeFox - Build KI8 (Zip-Auto-Extract)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    if: github.event.repository.owner.id == github.event.sender.id
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      MANIFEST_BRANCH: '12.1'
      DEVICE_NAME: 'KI8'
      DEVICE_PATH: 'device/tecno/KI8'
    permissions:
      contents: write

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: System Cleanup
      run: |
        echo "::group::🧹 Space Management"
        docker image prune -a -f
        sudo rm -rf /usr/share/dotnet /usr/local/lib/android
        echo "✅ Disk Ready"
        echo "::endgroup::"

    - name: Environment Setup
      run: |
        echo "::group::🛠️ Installing Build Tools"
        sudo apt update && sudo apt install -y git python3 bc build-essential zip unzip curl libncurses5 rsync wget
        git clone https://gitlab.com/OrangeFox/misc/scripts
        cd scripts && sudo bash setup/android_build_env.sh
        echo "✅ Environment Ready"
        echo "::endgroup::"

    - name: Sync Source
      run: |
        echo "::group::🔄 OrangeFox Sync"
        mkdir -p work && cd work
        git config --global user.name "Yash499"
        git config --global user.email "yash@example.com"
        git clone https://gitlab.com/OrangeFox/sync.git
        cd sync
        ./orangefox_sync.sh --branch ${{ env.MANIFEST_BRANCH }} --path ../fox_${{ env.MANIFEST_BRANCH }}
        echo "::endgroup::"

    - name: Tree Setup & Zip Extract Logic
      run: |
        echo "::group::🌳 Smart Tree Extraction"
        cd work/fox_${{ env.MANIFEST_BRANCH }}
        mkdir -p ${{ env.DEVICE_PATH }}
        
        # Clone repo
        git clone https://github.com/Yash499-cloud/Recovery -b main ./${{ env.DEVICE_PATH }}
        
        # Check if it's a ZIP file inside the repo
        if [ -f "${{ env.DEVICE_PATH }}/tecno_tree.zip" ]; then
          echo "📦 Zip file detected! Extracting..."
          cd ${{ env.DEVICE_PATH }}
          unzip tecno_tree.zip
          # Research: Zip ke andar folder ho sakta hai ya sidha files. 
          # Agar zip ke andar koi folder nikla, toh files ko root par move karo.
          if [ -d "Recovery-main" ]; then mv Recovery-main/* . && rm -rf Recovery-main; fi
          rm tecno_tree.zip
          cd ../../../
          echo "✅ Extraction Complete"
        fi

        # Verification
        if [ -f "${{ env.DEVICE_PATH }}/BoardConfig.mk" ]; then
          echo "✅ SUCCESS: BoardConfig.mk found at ${{ env.DEVICE_PATH }}"
          # Apply Patches
          sed -i '/TARGET_SCREEN_HEIGHT/d' ${{ env.DEVICE_PATH }}/BoardConfig.mk
          echo "TARGET_SCREEN_HEIGHT := 2460" >> ${{ env.DEVICE_PATH }}/BoardConfig.mk
          echo "TARGET_SCREEN_WIDTH := 1080" >> ${{ env.DEVICE_PATH }}/BoardConfig.mk
          echo "TW_THEME := portrait_hdpi" >> ${{ env.DEVICE_PATH }}/BoardConfig.mk
        else
          echo "❌ ERROR: Still can't find BoardConfig.mk!"
          echo "Current directory structure of ${{ env.DEVICE_PATH }}:"
          ls -R ${{ env.DEVICE_PATH }}
          exit 1
        fi
        echo "::endgroup::"

    - name: Compilation
      run: |
        echo "🚀 Starting MKA..."
        cd work/fox_${{ env.MANIFEST_BRANCH }}
        export ALLOW_MISSING_DEPENDENCIES=true
        export LC_ALL=C
        source build/envsetup.sh
        
        lunch twrp_${{ env.DEVICE_NAME }}-eng || lunch omni_${{ env.DEVICE_NAME }}-eng
        mka recoveryimage -j$(nproc --all)

    - name: Artifact Check & Release
      if: always()
      run: |
        echo "::group::📦 Finalizing"
        cd work/fox_${{ env.MANIFEST_BRANCH }}
        OUT_DIR="out/target/product/${{ env.DEVICE_NAME }}"
        if [ -d "$OUT_DIR" ]; then
           mkdir -p ${{ github.workspace }}/final
           find $OUT_DIR -name "OrangeFox*.img" -exec cp {} ${{ github.workspace }}/final/ \;
           find $OUT_DIR -name "OrangeFox*.zip" -exec cp {} ${{ github.workspace }}/final/ \;
           echo "BUILD_OK=true" >> $GITHUB_ENV
        else
           echo "❌ ERROR: Compilation failed."
        fi
        echo "::endgroup::"

    - name: Release
      if: env.BUILD_OK == 'true'
      uses: softprops/action-gh-release@v2
      with:
        files: final/*
        name: OrangeFox KI8 (Auto-Extracted) // ${{ github.run_id }}
        tag_name: ${{ github.run_id }}
        
