name: Recovery Build Brutal Force #56

on:
  workflow_dispatch:

env:
  MANIFEST_URL: "https://github.com/minimal-manifest-twrp/platform_manifest_twrp_aosp.git"
  MANIFEST_BRANCH: "twrp-12.1"
  DEVICE_TREE_URL: "https://github.com/Yash499-cloud/Il2cppdumper"
  DEVICE_TREE_BRANCH: "main"
  DEVICE_NAME: "TECNO_KI8"

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Cleanup & Environment
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/local/share/boost
          sudo apt-get update
          sudo apt-get install -y gperf gcc-multilib gcc-10-multilib g++-multilib g++-10-multilib libc6-dev libncurses5-dev x11proto-core-dev libx11-dev lib32z1-dev libgl1-mesa-dev libxml2-utils xsltproc unzip fontconfig libncurses-dev git python3
          mkdir -p ~/bin && curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
          chmod a+x ~/bin/repo && sudo ln -sf ~/bin/repo /usr/bin/repo

      - name: Sync Source
        run: |
          mkdir -p ~/fox && cd ~/fox
          repo init --depth=1 -u ${{ env.MANIFEST_URL }} -b ${{ env.MANIFEST_BRANCH }}
          repo sync -c -j$(nproc --all) --force-sync --no-tags --no-clone-bundle

      - name: Force Fix Device Tree & Inject Ninja Targets
        run: |
          cd ~/fox
          CLEAN_NAME=$(echo "${{ env.DEVICE_NAME }}" | sed 's/-/_/g')
          git clone ${{ env.DEVICE_TREE_URL }} -b ${{ env.DEVICE_TREE_BRANCH }} device/tecno/$CLEAN_NAME || true
          
          cd device/tecno/$CLEAN_NAME
          
          # BoardConfig mein Recovery Target force karo
          echo "BOARD_HAS_NO_SELECTIVE_FETCH := true" >> BoardConfig.mk
          echo "RECOVERY_VARIANT := twrp" >> BoardConfig.mk
          echo "TARGET_RECOVERY_DEVICE_DIRS := device/tecno/$CLEAN_NAME" >> BoardConfig.mk
          
          # Android.mk check (Ninja isko dhoondta hai)
          if [ ! -f Android.mk ]; then
            echo "include \$(call all-subdir-makefiles)" > Android.mk
          fi

      - name: Build Recovery (Brutal Mode)
        run: |
          cd ~/fox
          sudo swapoff -a || true
          sudo fallocate -l 4G /swapfile && sudo chmod 600 /swapfile && sudo mkswap /swapfile && sudo swapon /swapfile
          
          source build/envsetup.sh
          CLEAN_NAME=$(echo "TECNO_KI8" | sed 's/-/_/g')
          
          export ALLOW_MISSING_DEPENDENCIES=true
          export LC_ALL=C
          
          lunch omni_$CLEAN_NAME-userdebug || (echo "Lunch failed" && exit 1)
          
          # Sabse bada weapon: Pehle bootimage try karo, phir recovery
          # Kai baar A/B devices mein recovery boot.img ke andar hoti hai
          make bootimage recoveryimage -j$(nproc --all) || make recovery -j$(nproc --all)

      - name: Collect Everything (Deep Scan)
        if: always()
        run: |
          mkdir -p ~/outputs
          # Ab hum pura out folder scan karenge
          find ~/fox/out/target/product/ -name "*.img" -exec cp {} ~/outputs/ \;
          find ~/fox/out/target/product/ -name "OrangeFox*.zip" -exec cp {} ~/outputs/ \;
          ls -R ~/outputs/
          
      - name: Upload Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Recovery-All-Possible-Images
          path: ~/outputs/*
          
