name: Recovery Build

on:
  workflow_dispatch:

env:
  MANIFEST_URL: "https://github.com/minimal-manifest-twrp/platform_manifest_twrp_aosp.git"
  MANIFEST_BRANCH: "twrp-12.1"
  DEVICE_TREE_URL: "https://github.com/Yash499-cloud/Il2cppdumper"
  DEVICE_TREE_BRANCH: "main"
  DEVICE_NAME: "TECNO_KI8"
  BUILD_TARGET: "recovery"

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cleanup Space
        uses: rokibhasansagar/slimhub_actions@main

      - name: Set up Environment
        run: |
          sudo apt-get update
          sudo apt-get install -y gperf gcc-multilib gcc-10-multilib g++-multilib g++-10-multilib libc6-dev libncurses5-dev x11proto-core-dev libx11-dev lib32z1-dev libgl1-mesa-dev libxml2-utils xsltproc unzip fontconfig libncurses-dev

      - name: Install Repo Tool
        run: |
          mkdir -p ~/bin
          curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
          chmod a+x ~/bin/repo
          sudo ln -sf ~/bin/repo /usr/bin/repo

      - name: Sync Source
        run: |
          git config --global user.email "gh-actions@github.com"
          git config --global user.name "GitHub Actions"
          mkdir -p ~/fox && cd ~/fox
          repo init --depth=1 -u ${{ env.MANIFEST_URL }} -b ${{ env.MANIFEST_BRANCH }}
          repo sync -c -j$(nproc --all) --force-sync --no-tags --no-clone-bundle

      - name: Ultra-Smart Fixer
        run: |
          cd ~/fox
          git clone ${{ env.DEVICE_TREE_URL }} -b ${{ env.DEVICE_TREE_BRANCH }} device/tecno/${{ env.DEVICE_NAME }}
          cd device/tecno/${{ env.DEVICE_NAME }}
          
          # 1. Sabse pehle names clean karo
          find . -name "omni_*.mk" -exec mv {} omni_${{ env.DEVICE_NAME }}.mk \; || true
          find . -type f -exec sed -i "s/TECNO-KI8/${{ env.DEVICE_NAME }}/g" {} +
          
          # 2. Obsolete lines ko comment karo (taaki syntax na bigde)
          sed -i 's/^PRODUCT_STATIC_BOOT_CONTROL_HAL/#&/' device.mk || true
          sed -i 's/^include $(BUILD_STATIC_LIBRARY)/#&/' Android.mk || true
          
          # 3. Missing separator fix (sabse bada locha yahi hai)
          # Ye command har line ko check karegi aur unwanted characters hatayegi
          sed -i 's/\r$//' *.mk *.sh || true 
          
          # 4. AndroidProducts.mk fix
          echo -e "PRODUCT_MAKEFILES := \$(LOCAL_DIR)/omni_${{ env.DEVICE_NAME }}.mk\n\nCOMMON_LUNCH_CHOICES := omni_${{ env.DEVICE_NAME }}-userdebug" > AndroidProducts.mk

      - name: Build
        run: |
          cd ~/fox
          export ALLOW_MISSING_DEPENDENCIES=true
          export LC_ALL=C
          source build/envsetup.sh
          lunch omni_${{ env.DEVICE_NAME }}-userdebug
          mka ${{ env.BUILD_TARGET }}image -j$(nproc --all)

      - name: Upload Result
        uses: actions/upload-artifact@v4
        with:
          name: Recovery-Image
          path: /home/runner/fox/out/target/product/${{ env.DEVICE_NAME }}/recovery.img
          
