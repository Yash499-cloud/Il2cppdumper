name: OrangeFox - Build KI8 (Final-Logic-Gate)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      MANIFEST: '12.1'
      DEVICE: 'KI8'
      DT_LINK: 'https://github.com/Yash499-cloud/Recovery'
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Environment Setup
        run: |
          sudo apt update
          sudo apt install -y git python3 bc build-essential zip curl wget rsync
          sudo rm -rf /usr/share/dotnet /etc/mysql /usr/local/lib/android
          
      - name: Sync Source (With Verification)
        run: |
          mkdir -p work && cd work
          git config --global user.name "Yash499"
          git config --global user.email "yash@example.com"
          git clone https://gitlab.com/OrangeFox/sync.git
          cd sync
          # Force sync logic
          ./orangefox_sync.sh --branch ${{ env.MANIFEST }} --path ../fox_${{ env.MANIFEST }} || echo "Sync had issues, but checking folder..."
          
          cd ..
          if [ ! -d "fox_${{ env.MANIFEST }}" ]; then
            echo "ERROR: Folder fox_${{ env.MANIFEST }} not found! Searching for any sync folder..."
            ls -R
            # Agar folder nahi mila toh jo bhi directory bani hai use hi fox folder maan lo
            FOUND_DIR=$(find . -maxdepth 1 -type d -name "fox*" | head -n 1)
            if [ -n "$FOUND_DIR" ]; then mv "$FOUND_DIR" "fox_${{ env.MANIFEST }}"; else exit 1; fi
          fi

      - name: Clone Tree & Fix BoardConfig
        run: |
          # Dhoondho ki fox folder kahan hai
          FOX_PATH=$(find . -name "build" -type d | grep "fox" | head -n 1 | sed 's/\/build//')
          cd $FOX_PATH
          
          mkdir -p device/tecno/${{ env.DEVICE }}
          git clone ${{ env.DT_LINK }} -b main ./device/tecno/${{ env.DEVICE }}
          
          # Auto-Fix Screen Resolution
          BC_PATH="device/tecno/${{ env.DEVICE }}/BoardConfig.mk"
          if [ -f "$BC_PATH" ]; then
            sed -i '/TARGET_SCREEN_HEIGHT/d' $BC_PATH
            sed -i '/TARGET_SCREEN_WIDTH/d' $BC_PATH
            echo "TARGET_SCREEN_HEIGHT := 2460" >> $BC_PATH
            echo "TARGET_SCREEN_WIDTH := 1080" >> $BC_PATH
            echo "TW_THEME := portrait_hdpi" >> $BC_PATH
          fi

      - name: Build Execution (Step-by-Step)
        run: |
          FOX_PATH=$(find . -name "build" -type d | grep "fox" | head -n 1 | sed 's/\/build//')
          cd $FOX_PATH
          source build/envsetup.sh
          export ALLOW_MISSING_DEPENDENCIES=true
          
          # Trying multiple lunch targets
          lunch twrp_${{ env.DEVICE }}-eng || lunch omni_${{ env.DEVICE }}-eng || lunch aosp_${{ env.DEVICE }}-eng
          
          mka recoveryimage -j$(nproc --all) || mka ${{ env.DEVICE }} -j$(nproc --all)

      - name: Intelligent Artifact Grabber
        if: always()
        run: |
          # Kisi bhi folder mein .img file dhoondho
          OUTPUT_DIR=$(find . -name "${{ env.DEVICE }}" -type d | grep "target/product" | head -n 1)
          if [ -d "$OUTPUT_DIR" ]; then
            cd $OUTPUT_DIR
            mkdir -p ${{ github.workspace }}/upload
            cp *.img ${{ github.workspace }}/upload/ 2>/dev/null || true
            cp *.zip ${{ github.workspace }}/upload/ 2>/dev/null || true
          else
            echo "Build directory not found. Listing all files for debug:"
            find . -name "*.img"
          fi
          
      - name: Release to GitHub
        if: always()
        uses: softprops/action-gh-release@v2
        with:
          files: upload/*
          name: OrangeFox KI8 Final-Logic // ${{ github.run_id }}
          tag_name: ${{ github.run_id }}
          body: "Auto-detected build files."
          
