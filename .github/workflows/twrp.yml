name: Recovery Build Ninja-Targeted

on:
  workflow_dispatch:

env:
  MANIFEST_URL: "https://github.com/minimal-manifest-twrp/platform_manifest_twrp_aosp.git"
  MANIFEST_BRANCH: "twrp-12.1"
  DEVICE_TREE_URL: "https://github.com/Yash499-cloud/Il2cppdumper"
  DEVICE_TREE_BRANCH: "main"
  DEVICE_NAME: "TECNO_KI8"

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Cleanup & Environment
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/local/share/boost
          sudo apt-get update
          sudo apt-get install -y gperf gcc-multilib gcc-10-multilib g++-multilib g++-10-multilib libc6-dev libncurses5-dev x11proto-core-dev libx11-dev lib32z1-dev libgl1-mesa-dev libxml2-utils xsltproc unzip fontconfig libncurses-dev git python3
          mkdir -p ~/bin && curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
          chmod a+x ~/bin/repo && sudo ln -sf ~/bin/repo /usr/bin/repo

      - name: Sync Source
        run: |
          mkdir -p ~/fox && cd ~/fox
          repo init --depth=1 -u ${{ env.MANIFEST_URL }} -b ${{ env.MANIFEST_BRANCH }}
          repo sync -c -j$(nproc --all) --force-sync --no-tags --no-clone-bundle

      - name: Setup & Satisfy Ninja (Fixing Tree)
        run: |
          cd ~/fox
          CLEAN_NAME=$(echo "${{ env.DEVICE_NAME }}" | sed 's/-/_/g')
          git clone ${{ env.DEVICE_TREE_URL }} -b ${{ env.DEVICE_TREE_BRANCH }} device/tecno/$CLEAN_NAME
          
          cd device/tecno/$CLEAN_NAME

          # 1. Sabhi files se Windows endings hatao (Essential for Ninja)
          find . -type f -exec sed -i 's/\r//' {} +

          # 2. Overwrite device.mk & AndroidProducts (Pure and Clean)
          rm -f device.mk AndroidProducts.mk
          echo "LOCAL_PATH := device/tecno/$CLEAN_NAME" > device.mk
          echo 'PRODUCT_COPY_FILES += $(LOCAL_PATH)/recovery.fstab:recovery/root/etc/recovery.fstab' >> device.mk
          
          cat <<EOF > AndroidProducts.mk
          PRODUCT_MAKEFILES := \$(LOCAL_DIR)/omni_$CLEAN_NAME.mk
          COMMON_LUNCH_CHOICES := omni_$CLEAN_NAME-userdebug
          EOF

          # 3. Path Correction (Omni -> TWRP)
          find . -type f -name "*.mk" -exec sed -i 's/vendor\/omni/vendor\/twrp/g' {} +

          # 4. BoardConfig: Ninja's Main Meal
          # Yahan hum wo variables de rahe hain jo Ninja dhoond raha hai
          {
            echo "TARGET_ARCH := arm64"
            echo "TARGET_ARCH_VARIANT := armv8-a"
            echo "TARGET_CPU_VARIANT := generic"
            echo "TARGET_2ND_ARCH := arm"
            echo "TARGET_2ND_ARCH_VARIANT := armv7-a-neon"
            echo "TARGET_2ND_CPU_VARIANT := generic"
            echo "BOARD_RECOVERYIMAGE_PARTITION_SIZE := 104857600" # 100MB (Safe bet)
            echo "BOARD_FLASH_BLOCK_SIZE := 131072"
            echo "BOARD_HAS_NO_REAL_SDCARD := true"
            echo "TARGET_USERIMAGES_USE_EXT4 := true"
            echo "RECOVERY_SDCARD_ON_DATA := true"
            echo "ALLOW_MISSING_DEPENDENCIES := true"
          } >> BoardConfig.mk

      - name: Build Recovery (Direct Target)
        run: |
          cd ~/fox
          export ALLOW_MISSING_DEPENDENCIES=true
          source build/envsetup.sh
          CLEAN_NAME=$(echo "${{ env.DEVICE_NAME }}" | sed 's/-/_/g')
          
          lunch omni_$CLEAN_NAME-userdebug || (echo "Lunch failed" && exit 1)
          
          # Force Ninja to start from scratch
          make clean
          
          # Ninja ko direct target pakdao
          make recoveryimage -j$(nproc --all)

      - name: Extract Artifacts
        if: always()
        run: |
          mkdir -p ~/outputs
          CLEAN_NAME=$(echo "${{ env.DEVICE_NAME }}" | sed 's/-/_/g')
          # Deep search for the image
          find ~/fox/out/target/product/$CLEAN_NAME/ -name "recovery.img" -exec cp {} ~/outputs/ \;
          find ~/fox/out/target/product/$CLEAN_NAME/ -name "*.zip" -exec cp {} ~/outputs/ \;
          # Agar files mil gayi toh list karke dikhao
          ls -R ~/outputs/

      - name: Upload Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Recovery-Ninja-Satisfied
          path: ~/outputs/*
          
