name: OrangeFox - Build KI8 (Full-Log-Uploader)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      MANIFEST_BRANCH: '12.1'
      DEVICE_NAME: 'KI8'
      DEVICE_PATH: 'device/tecno/KI8'
    permissions:
      contents: write

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Cleanup & Setup
      run: |
        sudo apt update && sudo apt install -y git python3 bc build-essential zip unzip curl rsync wget libssl-dev
        git clone https://gitlab.com/OrangeFox/misc/scripts
        cd scripts && sudo bash setup/android_build_env.sh

    - name: Sync & Tree Prep
      run: |
        mkdir -p work && cd work
        git clone https://gitlab.com/OrangeFox/sync.git
        cd sync
        ./orangefox_sync.sh --branch ${{ env.MANIFEST_BRANCH }} --path ../fox_${{ env.MANIFEST_BRANCH }}
        
        cd ../fox_${{ env.MANIFEST_BRANCH }}
        mkdir -p ${{ env.DEVICE_PATH }}
        git clone https://github.com/Yash499-cloud/Recovery -b main ./${{ env.DEVICE_PATH }}
        
        # Extraction logic
        cd ${{ env.DEVICE_PATH }}
        if [ -f "tecno_tree.zip" ]; then
          unzip -o tecno_tree.zip && rm tecno_tree.zip
          ACTUAL_FOLDER=$(find . -name "BoardConfig.mk" -printf '%h\n' | head -n 1)
          if [ "$ACTUAL_FOLDER" != "." ] && [ -n "$ACTUAL_FOLDER" ]; then mv $ACTUAL_FOLDER/* . ; fi
        fi

    - name: Compilation (Capturing Logs)
      run: |
        cd work/fox_${{ env.MANIFEST_BRANCH }}
        export ALLOW_MISSING_DEPENDENCIES=true
        export LC_ALL=C
        source build/envsetup.sh
        
        # Try to lunch and capture output
        lunch twrp_${{ env.DEVICE_NAME }}-eng || lunch omni_${{ env.DEVICE_NAME }}-eng || lunch ${{ env.DEVICE_NAME }}-eng
        
        # Building with log capture
        mka recoveryimage -j$(nproc --all) 2>&1 | tee build_log.txt || true
        
        # Build fail ho ya pass, log ko root mein move karo upload ke liye
        cp build_log.txt ${{ github.workspace }}/build_log.txt

    - name: Generate Direct Download Link
      if: always()
      run: |
        echo "::group::🔗 Direct Download Links"
        # Log ko transfer.sh par upload kar raha hoon taaki direct link mile
        LINK=$(curl --upload-file ${{ github.workspace }}/build_log.txt https://transfer.sh/build_log.txt)
        echo "--------------------------------------------------"
        echo "BUILD LOG DIRECT LINK: $LINK"
        echo "--------------------------------------------------"
        echo "link=$LINK" >> $GITHUB_ENV
        echo "::endgroup::"

    - name: Upload Build Log to GitHub
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: build-log-${{ env.DEVICE_NAME }}
        path: ${{ github.workspace }}/build_log.txt

    - name: Check Artifacts & Release
      if: always()
      run: |
        cd work/fox_${{ env.MANIFEST_BRANCH }}
        mkdir -p ${{ github.workspace }}/final
        find out/target/product/ -name "OrangeFox*.img" -exec cp {} ${{ github.workspace }}/final/ \; 2>/dev/null || true
        find out/target/product/ -name "OrangeFox*.zip" -exec cp {} ${{ github.workspace }}/final/ \; 2>/dev/null || true
        
        if [ "$(ls -A ${{ github.workspace }}/final)" ]; then
           echo "BUILD_OK=true" >> $GITHUB_ENV
        fi

    - name: Release Final Build
      if: env.BUILD_OK == 'true'
      uses: softprops/action-gh-release@v2
      with:
        files: final/*
        name: OrangeFox KI8 Successful Build // ${{ github.run_id }}
        tag_name: ${{ github.run_id }}
        body: |
          Build successful!
          Download Log: ${{ env.link }}
          
