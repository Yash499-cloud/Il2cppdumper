name: OrangeFox - God-Mode AI Build Engine (KI8-Final)

on:
  workflow_dispatch:
    inputs:
      build_strategy:
        description: 'Select Build Strategy'
        required: true
        default: 'Official-Like'
        type: choice
        options:
        - Official-Like
        - Experimental-MTK
      clean_sync:
        description: 'Force Clean Sync?'
        required: false
        default: 'false'
        type: boolean

jobs:
  build:
    runs-on: ubuntu-22.04

    env:
      MANIFEST_BRANCH: '12.1'
      DEVICE_PATH: 'device/tecno/KI8'
      DEVICE_NAME: 'KI8'
      MAINTAINER: 'Yash499-cloud'
      SYNC_URL: 'https://gitlab.com/OrangeFox/sync.git'
      TREE_URL: 'https://github.com/Yash499-cloud/Recovery'
      AUTO_FIX_MTK: true
      VERBOSE_LOGGING: true

    permissions:
      contents: write

    steps:

# ===============================
# PHASE 1 ENVIRONMENT
# ===============================

    - name: Checkout Repo
      uses: actions/checkout@v4

    - name: Disk Cleanup
      run: |
        df -h
        sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
        sudo apt-get clean
        docker image prune -a -f
        df -h

# ===============================
# PHASE 2 DEPENDENCIES
# ===============================

    - name: Install Dependencies
      run: |
        sudo apt-get update -y
        sudo apt-get install -y \
        git-core gnupg flex bison gperf build-essential \
        zip curl zlib1g-dev gcc-multilib g++-multilib libc6-dev-i386 \
        lib32ncurses5-dev x11proto-core-dev libx11-dev lib32z1-dev \
        libgl1-mesa-dev libxml2-utils xsltproc unzip bc rsync \
        schedtool libssl-dev libreadline-dev libncurses5-dev \
        lib32stdc++6 libelf-dev python3 openjdk-11-jdk \
        p7zip-full imagemagick wget

# ===============================
# PHASE 3 SOURCE SYNC
# ===============================

    - name: OrangeFox Source Sync
      run: |
        mkdir work
        cd work

        git config --global user.name "${{ env.MAINTAINER }}"
        git config --global user.email "ai@build-engine.com"

        git clone ${{ env.SYNC_URL }} sync_logic
        cd sync_logic

        chmod +x orangefox_sync.sh
        ./orangefox_sync.sh --branch ${{ env.MANIFEST_BRANCH }} --path ../fox_root

        if [ ! -d "../fox_root/build" ]; then
          echo "SYNC FAILED"
          exit 1
        fi

# ===============================
# PHASE 4 DEVICE TREE
# ===============================

    - name: Clone Device Tree
      run: |
        cd work/fox_root

        mkdir -p ${{ env.DEVICE_PATH }}

        git clone ${{ env.TREE_URL }} ./${{ env.DEVICE_PATH }}

        cd ${{ env.DEVICE_PATH }}

        if [ -f "tecno_tree.zip" ]; then
          unzip -o tecno_tree.zip
          rm tecno_tree.zip
        fi

# ===============================
# PHASE 5 AUTO PATCH
# ===============================

    - name: MTK Hardware Fix
      run: |
        cd work/fox_root/${{ env.DEVICE_PATH }}

        if [ -f BoardConfig.mk ]; then
          sed -i '/TARGET_SCREEN_HEIGHT/d' BoardConfig.mk
          sed -i '/TARGET_SCREEN_WIDTH/d' BoardConfig.mk

          echo "TARGET_SCREEN_HEIGHT := 2460" >> BoardConfig.mk
          echo "TARGET_SCREEN_WIDTH := 1080" >> BoardConfig.mk
          echo "TW_THEME := portrait_hdpi" >> BoardConfig.mk
          echo "BOARD_HAS_NO_REAL_SDCARD := true" >> BoardConfig.mk
          echo "RECOVERY_SDCARD_ON_DATA := true" >> BoardConfig.mk
        fi

# ===============================
# PHASE 6 BUILD
# ===============================

    - name: Compile Recovery
      run: |
        cd work/fox_root

        export ALLOW_MISSING_DEPENDENCIES=true
        export LC_ALL=C
        export OF_AB_DEVICE=1
        export FOX_USE_TWRP_RECOVERY_IMAGE_BUILDER=1

        source build/envsetup.sh

        DETECTED_ID=$(grep -r "PRODUCT_DEVICE" ${{ env.DEVICE_PATH }} | head -n 1 | awk '{print $NF}')

        if [ -z "$DETECTED_ID" ]; then
          DETECTED_ID=${{ env.DEVICE_NAME }}
        fi

        lunch twrp_$DETECTED_ID-eng || lunch omni_$DETECTED_ID-eng || exit 1

        mka recoveryimage -j$(nproc) 2>&1 | tee build_log.txt

        cp build_log.txt ${{ github.workspace }}/build_log.txt

# ===============================
# PHASE 7 ARTIFACT
# ===============================

    - name: Collect Artifacts
      if: always()
      run: |
        mkdir output

        cd work/fox_root

        find out/target/product/ -name "*.img" -exec cp {} ${{ github.workspace }}/output/ \; 2>/dev/null || true
        find out/target/product/ -name "*.zip" -exec cp {} ${{ github.workspace }}/output/ \; 2>/dev/null || true

# ===============================
# PHASE 8 RELEASE
# ===============================

    - name: Upload Release
      if: always()
      uses: softprops/action-gh-release@v2
      with:
        files: output/*
        tag_name: ${{ github.run_id }}
        name: OrangeFox KI8 Build
