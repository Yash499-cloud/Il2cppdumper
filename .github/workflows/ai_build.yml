name: OrangeFox Build

on:
workflow_dispatch:

jobs:
build:
runs-on: ubuntu-latest

steps:

- name: Checkout Repository
  uses: actions/checkout@v3

- name: Install Build Dependencies
  run: |
    sudo apt update
    sudo apt install -y git wget curl repo python3 python-is-python3 bc bison build-essential ccache flex g++-multilib gcc-multilib gnupg gperf imagemagick lib32ncurses5-dev lib32readline-dev lib32z1-dev liblz4-tool libncurses5 libncurses5-dev libsdl1.2-dev libssl-dev libxml2 libxml2-utils lzop pngcrush rsync schedtool squashfs-tools xsltproc zip zlib1g-dev

- name: Initialize OrangeFox Source
  run: |
    mkdir fox
    cd fox
    repo init -u https://gitlab.com/OrangeFox/sync.git -b fox_12.1
    repo sync -j$(nproc)

- name: Clone Device Tree
  run: |
    cd fox
    git clone https://github.com/Yash499-cloud/tecno_tree device/tecno/KI8

- name: Setup Build Environment
  run: |
    cd fox
    source build/envsetup.sh
    lunch omni_KI8-eng

- name: Build Recovery
  run: |
    cd fox
    source build/envsetup.sh
    lunch omni_KI8-eng
    mka recoveryimage -j$(nproc)

- name: Upload Recovery Image
  uses: actions/upload-artifact@v3
  with:
    name: OrangeFox-Recovery
    path: fox/out/target/product/KI8/recovery.img
