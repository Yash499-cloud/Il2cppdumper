name: OrangeFox - Build (Automated for Tecno KI8)

on:
  workflow_dispatch:

jobs:
  build:
    name: Build OFRP for Tecno KI8
    runs-on: ubuntu-latest
    if: github.event.repository.owner.id == github.event.sender.id
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      MANIFEST_BRANCH: '12.1'
      DEVICE_TREE: 'https://github.com/${{ github.repository_owner }}/il2cppdumper'
      DEVICE_TREE_BRANCH: 'main'
      DEVICE_PATH: 'device/tecno/KI8'
      DEVICE_NAME: 'KI8'
      # Ab aapne underscore use kiya hai, toh target ye hoga:
      PRODUCT_NAME: 'omni_TECNO_KI8'
    permissions:
      contents: write
    steps:
    - name: Checkout
      uses: actions/checkout@v3

    - name: Clean-up
      uses: rokibhasansagar/slimhub_actions@main

    - name: Swap Space
      uses: pierotofy/set-swap-space@master
      with:
        swap-size-gb: 24
      
    - name: Build Environment
      run: |
        sudo apt update
        sudo apt -y upgrade
        git clone https://gitlab.com/OrangeFox/misc/scripts
        cd scripts
        sudo bash setup/android_build_env.sh
      
    - name: Set-up Manifest
      run: |
        mkdir -p ${GITHUB_WORKSPACE}/OrangeFox
        cd ${GITHUB_WORKSPACE}/OrangeFox
        git config --global user.name "Samuel Kendall"
        git config --global user.email "kinguser981@gmail.com"
        git clone https://gitlab.com/OrangeFox/sync.git
        cd sync
        ./orangefox_sync.sh --branch ${{ env.MANIFEST_BRANCH }} --path ${GITHUB_WORKSPACE}/OrangeFox/fox_${{ env.MANIFEST_BRANCH }}

    - name: Clone Device Tree
      run: |
        cd ${GITHUB_WORKSPACE}/OrangeFox/fox_${{ env.MANIFEST_BRANCH }}
        git clone https://${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository_owner }}/il2cppdumper.git -b ${{ env.DEVICE_TREE_BRANCH }} ./${{ env.DEVICE_PATH }}
        cd ${{ env.DEVICE_PATH }}
        echo "COMMIT_ID=$(git rev-parse HEAD)" >> $GITHUB_ENV

    - name: Building OrangeFox
      run: |
        cd ${GITHUB_WORKSPACE}/OrangeFox/fox_${{ env.MANIFEST_BRANCH }}
        set +e
        source build/envsetup.sh
        export ALLOW_MISSING_DEPENDENCIES=true
        set -e
        # Naya target underscore ke sath
        lunch ${{ env.PRODUCT_NAME }}-eng
        make clean
        mka adbd recoveryimage

    - name: Set Build Date
      run: |
        echo "BUILD_DATE=$(date +%Y%m%d)" >> $GITHUB_ENV

    - name: Check and Prepare Files
      run: |
        # Folder name ab underscore wala check karega
        if [ -d ${GITHUB_WORKSPACE}/OrangeFox/fox_${{ env.MANIFEST_BRANCH }}/out/target/product/TECNO_KI8 ]; then
          OUT_PATH="${GITHUB_WORKSPACE}/OrangeFox/fox_${{ env.MANIFEST_BRANCH }}/out/target/product/TECNO_KI8"
        elif [ -d ${GITHUB_WORKSPACE}/OrangeFox/fox_${{ env.MANIFEST_BRANCH }}/out/target/product/KI8 ]; then
          OUT_PATH="${GITHUB_WORKSPACE}/OrangeFox/fox_${{ env.MANIFEST_BRANCH }}/out/target/product/KI8"
        else
          OUT_PATH="${GITHUB_WORKSPACE}/OrangeFox/fox_${{ env.MANIFEST_BRANCH }}/out/target/product/tecno_ki8"
        fi
        
        cd $OUT_PATH
        if [ -f OrangeFox*.img ]; then
            echo "CHECK_IMG_IS_OK=true" >> $GITHUB_ENV
            cp OrangeFox*.img recovery.img
            echo "FILE_PATH=$OUT_PATH" >> $GITHUB_ENV
            
            # Recovery Installer logic
            wget https://github.com/kinguser981/recovery-installer/releases/download/11256427880/recovery-installer.zip
            zip -ur recovery-installer.zip recovery.img
        else
            echo "Build failed: Image not found in $OUT_PATH"
            exit 1
        fi

    - name: Upload to Release
      if: env.CHECK_IMG_IS_OK == 'true'
      uses: softprops/action-gh-release@v1
      with:
        files: |
          ${{ env.FILE_PATH }}/recovery.img
          ${{ env.FILE_PATH }}/recovery-installer.zip
          ${{ env.FILE_PATH }}/OrangeFox*.zip
        name: Unofficial OrangeFox for Tecno KI8 // ${{ env.BUILD_DATE }}
        tag_name: ${{ github.run_id }}
        body: |
          Build successful with Underscore (_) fix.
          Target: ${{ env.PRODUCT_NAME }}
          Commit: ${{ env.COMMIT_ID }}
          
