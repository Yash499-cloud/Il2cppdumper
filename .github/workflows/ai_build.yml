name: OrangeFox - God-Mode AI Build Engine

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    env:
      MANIFEST_BRANCH: '12.1'
      DEVICE_PATH: 'device/tecno/KI8'
      DEVICE_NAME: 'KI8'
      SYNC_URL: 'https://gitlab.com/OrangeFox/sync.git'
      TREE_URL: 'https://github.com/Yash499-cloud/Recovery'
    permissions:
      contents: write

    steps:
      - name: 🚀 Environment Setup
        uses: actions/checkout@v4

      - name: 🧹 Cleanup Space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
          sudo apt-get clean

      - name: 🔄 Sync Source
        run: |
          mkdir -p work && cd work
          git config --global user.name "Yash499-cloud"
          git config --global user.email "yash@build.ai"
          git clone ${{ env.SYNC_URL }} -b master sync_logic
          cd sync_logic
          ./orangefox_sync.sh --branch ${{ env.MANIFEST_BRANCH }} --path ../fox_root

      - name: 🌳 Clone Tree & Patch
        run: |
          cd work/fox_root
          git clone ${{ env.TREE_URL }} -b main ./${{ env.DEVICE_PATH }}
          cd ${{ env.DEVICE_PATH }}
          if [ -f "tecno_tree.zip" ]; then unzip -o tecno_tree.zip && rm tecno_tree.zip; fi
          # Auto-Patching Logic
          sed -i '/TARGET_SCREEN_HEIGHT/d' BoardConfig.mk || true
          echo "TARGET_SCREEN_HEIGHT := 2460" >> BoardConfig.mk
          echo "TARGET_SCREEN_WIDTH := 1080" >> BoardConfig.mk

      - name: 🔨 Build OrangeFox
        run: |
          cd work/fox_root
          export ALLOW_MISSING_DEPENDENCIES=true
          source build/envsetup.sh
          lunch twrp_KI8-eng || lunch omni_KI8-eng
          mka recoveryimage -j$(nproc --all)

      - name: 📦 Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: OrangeFox-KI8
          path: work/fox_root/out/target/product/KI8/*.img
