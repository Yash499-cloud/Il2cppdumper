name: OrangeFox - God-Mode AI Build Engine (KI8-Structure-Verified)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    env:
      MANIFEST_BRANCH: '12.1'
      DEVICE_PATH: 'device/tecno/KI8'
      DEVICE_NAME: 'KI8'
      TREE_URL: 'https://github.com/Yash499-cloud/Recovery'
    permissions:
      contents: write

    steps:
      - name: 🚀 Environment Boot-Up
        uses: actions/checkout@v4

      - name: 🧹 System Purge (Max Space)
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
          sudo apt-get clean

      - name: 🔄 Sync OrangeFox Source
        run: |
          mkdir -p work && cd work
          git config --global user.name "Yash499-cloud"
          git config --global user.email "ai@build.com"
          git clone https://gitlab.com/OrangeFox/sync.git -b master sync_logic
          cd sync_logic
          ./orangefox_sync.sh --branch ${{ env.MANIFEST_BRANCH }} --path ../fox_root

      - name: 🌳 Tree Extraction & Structure Alignment (Based on Photos)
        run: |
          cd work/fox_root
          mkdir -p ${{ env.DEVICE_PATH }}
          git clone ${{ env.TREE_URL }} -b main ./${{ env.DEVICE_PATH }}
          cd ${{ env.DEVICE_PATH }}
          
          # Force Extracting Zip
          if [ -f "tecno_tree.zip" ]; then
            unzip -o tecno_tree.zip
            rm tecno_tree.zip
          fi

          # Photo Analysis: Aligning Paths
          # Ensure prebuilt binaries are linked correctly in BoardConfig
          sed -i 's|$(DEVICE_PATH)/prebuilt/kernel|$(DEVICE_PATH)/kernel|g' BoardConfig.mk || true
          
          # Patching Display Resolution (1080x2460)
          sed -i '/TARGET_SCREEN_HEIGHT/d' BoardConfig.mk || true
          echo "TARGET_SCREEN_HEIGHT := 2460" >> BoardConfig.mk
          echo "TARGET_SCREEN_WIDTH := 1080" >> BoardConfig.mk

      - name: 🔨 AI Compilation Dispatch
        run: |
          cd work/fox_root
          export ALLOW_MISSING_DEPENDENCIES=true
          source build/envsetup.sh
          
          # Lunch Strategy based on Photo's mk file
          lunch omni_TECNO_KI8-eng || lunch twrp_KI8-eng
          
          mka recoveryimage -j$(nproc --all)

      - name: 📦 Upload Final Recovery
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: OrangeFox-KI8-Verified
          path: |
            work/fox_root/out/target/product/KI8/*.img
            work/fox_root/out/target/product/KI8/*.zip
            
